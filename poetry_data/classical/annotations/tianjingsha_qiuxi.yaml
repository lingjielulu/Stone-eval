    relation_type: reveals
    strength: {value: strong}
    evidence_text_span: P0004-P0005
    explanation: 夕陽西下完成時間的終結感，揭示斷腸人存在的語境。
foreshadowing_units:
  - foreshadowing_id: TJ_F01
    story_id: tianjingsha_qiuxi
    foreshadowing_text_span: P0001-P0003
    foreshadowing_summary: 九個名詞意象分三組堆疊（枯藤老樹昏鴉／小橋流水人家／古道西風瘦馬），全無動詞連接，純以名詞並置建立情感壓力。
    foreshadowing_type: symbolic
    trigger_event_id: TJ_E04
    payoff_event_id: TJ_E05
    payoff_text_span: P0005
    payoff_summary: 斷腸人在天涯——意象堆疊的全部重量在此句引爆為情感。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 詩中意象堆疊是古典詩詞中最純粹的伏筆結構：前半全是客觀意象的累積壓縮，直到最後一句才將主觀情感釋放。前三句越冷靜客觀，最後一句的情感爆發力越強。
characters:
