    evidence_text_span: P0001-P0005
    explanation: 蕭瑟景物直接醞釀斷腸之痛，九個名詞堆疊的全部重量壓向天涯旅人。
  - edge_id: TJ_C03
    story_id: tianjingsha_qiuxi
