annotation_guide:
  focus:
    - 標注每組名詞意象的堆疊方式：前半三句九個名詞意象分三組遞進，全無動詞連接。
    - 標注時間意象（夕陽）作為轉折點，將空間意象收束於情感爆發。
    - 標注斷腸人的出場為意象堆疊的情感 payoff。
  boundary_notes:
    - 九個名詞意象分別為物件型事件，標注其象徵功能和堆疊順序。
    - 斷腸人為情感事件而非物理事件，但作為意象堆疊的終點仍標為事件。
