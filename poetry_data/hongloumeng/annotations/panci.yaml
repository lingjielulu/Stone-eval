    foreshadowing_text_span: P0023-P0024
    foreshadowing_summary: 桃李春風結子完，到頭誰似一盆蘭——桃李（李紈之姓+李花）+結子（生子賈蘭）+完（終結）+蘭（賈蘭之名+君子之花），植物意象的序列預告李紈的命運。結子的完成即意義的終結——兒子的成功（蘭花）是她的全部，但成功到來時她已成他人笑談。
