    foreshadowing_text_span: P0019-P0020
    foreshadowing_summary: 凡鳥偏從末世來，一從二令三人木，哭向金陵事更哀——凡鳥（字謎=鳳）+末世（時代背景）+一從二令三人木（字謎婚姻三段式）+金陵（死亡空間），四重意象堆疊預告王熙鳳的命運：鳳凰降臨於衰世，婚姻經歷順從→命令→休棄的三段式崩潰，最終哭向金陵悲慘死去。
