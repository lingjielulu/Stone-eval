  - event_id: PC_E03
    story_id: hlm_panci
    chapter_or_section: "副冊"
    text_span: P0004-P0005
    summary: 香菱（甄英蓮）判詞——雙重意象堆疊：(1) 荷花意象——根並荷花一莖香，香菱原名甄英蓮（蓮即荷花），以荷花的清潔本質與一莖同根暗示她與其他薄命女子的命運相連。(2) 字謎意象——兩地（兩個土字疊為「圭」）生孤木（木旁），合為「桂」，預告夏金桂的出現是香菱命運的終點。香魂返故鄉以魂魄歸鄉的意象完成悲劇回收——從荷花到孤木，從芬芳到消逝，物件意象的變化即命運的軌跡。
    participants: [荷花, 香菱, 孤木, 香魂, 夏金桂]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E04
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0006-P0007
    summary: 黛玉寶釵合詠判詞——全書最核心的意象堆疊示範。第一層：典故對偶——停機德（樂羊子妻斷織勸學，喻寶釵之賢德）與詠絮才（謝道韞詠雪，喻黛玉之詩才），以歷史典故建立德與才的二元對照框架。第二層：物件+空間的命運編碼——玉帶林中掛（玉帶作為高潔之物被棄置林間，玉帶林→林黛玉，姓名嵌入式雙關，掛=懸置、無用、被遺忘的命運）；金簪雪裡埋（金簪作為貴重之物被深埋雪下，金簪雪→薛寶釵，埋=深藏、冷落、被掩埋的命運）。一掛一埋，以空間動詞構成對稱的悲劇命運。
    participants: [黛玉, 寶釵, 玉帶, 金簪, 林, 雪, 停機德, 詠絮才]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E05
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0008-P0009
    summary: 元春判詞——宮廷意象與時間隱喻的堆疊。(1) 二十年來辨是非——以時間長度標定元春在宮廷中積累的政治判斷。(2) 榴花開處照宮闈——榴花（石榴花）既為富貴燦爛之物，又含多子（石榴多籽）之意，照=光照宮廷，暗示元春的榮耀與生育。榴花是短暫而豔麗的，預告榮耀的不可持續。(3) 三春爭及初春景——三春（迎春、探春、惜春）不及初春（元春），以春的等級建立姐妹命運的差序。(4) 虎兔相逢大夢歸——虎年與兔年交替之際，大夢（人生如夢）歸去，虎兔兩種動物的相遇即死亡時刻的密碼，將時間與死亡編碼為動物意象的碰撞。
    participants: [元春, 榴花, 宮闈, 虎, 兔, 三春, 初春]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E06
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0010-P0011
    summary: 探春判詞——清明、江邊、東風、夢的四重意象堆疊。(1) 才自清明志自高——以清明（節氣）的澄澈比附才華，暗示探春的清明之才。(2) 生於末世運偏消——末世（賈府衰落期）作為時代背景壓制個人命運。(3) 清明涕泣江邊望——清明節在江邊哭泣遠望，節氣+空間+情感的疊加：清明本為祭祖團聚之日，探春卻在江邊遠望，暗示遠嫁海疆、骨肉分離。(4) 千里東風一夢遙——東風送船遠行千里，夢=遠嫁如夢、歸鄉無期。東風意象的溫暖與夢的縹渺並置，構成遠嫁命運的詩意編碼。
    participants: [探春, 清明, 江邊, 東風, 夢]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E07
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0012
    summary: 史湘雲判詞——富貴、襁褓、斜輝、湘江、楚雲的五重意象堆疊。(1) 富貴又何為——以反問解構富貴的價值。(2) 襁褓之間父母違——襁褓（嬰兒包裹）作為物件意象，嵌入孤兒身世：父母雙亡於其嬰兒時期，襁褓即命運的起點。(3) 展眼吊斜輝——斜輝（夕陽）的短暫光輝，吊=憑弔，以落日意象預告盛年之後的衰微。(4) 湘江水逝楚雲飛——湘江之水逝去、楚雲飛散，雙重自然意象的消逝構成命運的終結：湘江之水不可留、楚雲之飛不可追。湘+雲=史湘雲，姓名以山川雲水的消散之物嵌入，預告其「雲散高唐、水涸湘江」的結局。
    participants: [史湘雲, 襁褓, 斜輝, 湘江, 楚雲]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E08
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0013-P0014
    summary: 妙玉判詞——潔與空的反向意象堆疊。(1) 欲潔何曾潔——潔（清潔/高潔）是妙玉的自我期許，何曾=從未真正實現，以否定副詞拆解「潔」的命題。(2) 雲空未必空——空（佛教空觀）是妙玉身為尼姑的信仰，未必=不確定，否定空觀的真實性。(3) 可憐金玉質——金玉（貴重之物）作為身分隱喻，金玉質=高潔的材質/出身。(4) 終陷淖泥中——淖泥（污泥）與金玉構成二元對立：最高潔的材質落入最污濁的空間。金玉→淖泥的空間轉移即妙玉被劫受辱的命運預告，以材質與空間的反差建立悲劇的終極張力。
    participants: [妙玉, 金玉, 淖泥]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E09
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0015-P0016
    summary: 迎春判詞——動物意象與植物意象的暴力碰撞。(1) 子係中山狼——子+係=孫（字謎嵌入孫紹祖），中山狼（典故：東郭先生的中山狼，忘恩負義之物），以動物典故將丈夫姓名與品性一併編碼。(2) 得志便猖狂——中山狼的動作展開，猖狂=暴虐。(3) 金閨花柳質——花柳（嬌嫩的植物意象）作為迎春的身體/身分隱喻：金閨（富貴閨閣）+花柳（柔弱之美），構成女性的脆弱本質。(4) 一載赴黃粱——黃粱（黃粱一夢，典故），以夢的短暫性暗示婚後一年即被虐待致死。中山狼（暴虐的動物）摧毀花柳（柔弱的植物），以物種間的暴力關係編碼婚姻中的虐待與死亡。
    participants: [迎春, 中山狼, 花柳, 黃粱, 孫紹祖]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E10
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0017-P0018
    summary: 惜春判詞——春的勘破與宗教物件的替代。(1) 勘破三春景不長——三春（元春、迎春、探春三位姐姐）的美好光景不長久，勘破=看透，以三春的凋零為惜春的覺悟鋪墊。(2) 緇衣頓改昔年妝——緇衣（黑色僧袍）作為宗教物件替換昔年妝（貴族少女的華服），物件替換即人生道路的轉折：從侯門繡戶到佛門青燈。(3) 可憐繡戶侯門女——繡戶+侯門，雙重富貴空間的堆疊確認惜春的出身。(4) 獨臥青燈古佛旁——青燈+古佛，雙重宗教物件的堆疊構成歸宿：青燈的孤冷與古佛的寂滅替代了繡戶的華麗與侯門的繁盛。從三春之景到古佛之旁，空間與物件的逐步替換完成惜春從貴族小姐到出家尼姑的命運編碼。
    participants: [惜春, 三春, 緇衣, 青燈, 古佛]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E11
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0019-P0020
    summary: 王熙鳳判詞——字謎拆解與空間移動的命運編碼。(1) 凡鳥偏從末世來——凡+鳥=鳳（字謎拆解嵌入王熙鳳之名），鳳凰本為祥瑞之物，卻偏在末世降臨，吉祥之物與衰敗時代的錯位構成悲劇前提。(2) 都知愛慕此生才——才幹被眾人認可，為鳳姐的強勢形象定調。(3) 一從二令三人木——全書最著名的字謎：一從（順從丈夫）、二令（命令丈夫）、三人木（人+木=休，被休棄），三個階段壓縮為三個字謎，以拆字法編碼鳳姐婚姻從順從到掌權到被休的三段式命運。(4) 哭向金陵事更哀——金陵（賈府老家）的方向性移動+哭泣的情感+更哀的遞進，暗示鳳姐最終在返回金陵途中或之後悲慘死去。末世→凡鳥→才→休→哭→哀，形成從盛世到末路的漸降鏈條。
    participants: [王熙鳳, 凡鳥, 末世, 金陵]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E12
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0021-P0022
    summary: 巧姐判詞——勢敗家亡背景下的恩情因果。(1) 勢敗休雲貴——權勢衰敗後不再談貴賤，勢敗=賈府抄家後的狀態。(2) 家亡莫論親——家族滅亡後親戚不可依靠（暗示巧姐被狠舅奸兄所賣）。(3) 偶因濟村婦——偶然因為曾經接濟過一位村婦（劉姥姥），濟村婦=因果的起點，強調偶然性（偶因）而非必然。(4) 巧得遇恩人——巧（既指巧姐之名又指機緣巧合）+恩人（劉姥姥），以名字的巧合與恩情的回收構成完整因果鏈：從鳳姐濟助劉姥姥的偶然善舉，到巧姐被劉姥姥搭救的命運轉折。村婦與恩人的意象轉化，將底層人物的樸素善意編碼為貴族小姐的唯一救贖。
    participants: [巧姐, 村婦, 恩人, 劉姥姥]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E13
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0023-P0024
    summary: 李紈判詞——植物意象與生命週期的命運編碼。(1) 桃李春風結子完——桃李（李紈之姓嵌入，桃李並舉更顯繁盛）在春風中結子（生子賈蘭），但結子之際即「完」結之時，生命的完成與終結同步。(2) 到頭誰似一盆蘭——蘭（賈蘭之名嵌入），蘭花為君子之花，暗示賈蘭最終功成名就、成為一盆獨秀之蘭。(3) 如冰水好空相妒——冰與水同質而形態不同，喻世人對李紈母子成功的嫉妒是虛妄的。(4) 枉與他人作笑談——即便兒子成功，李紈自己已老死，徒然成為他人談資。桃李→結子→蘭→冰水→笑談，從繁盛到成功到虛無，以植物意象的盛衰循環編碼李紈「有功無命」的悲劇：她用青春守寡換來兒子的功名，但功名到來時她自己已成虛妄的笑談。
    participants: [李紈, 桃李, 蘭, 冰水, 賈蘭]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E14
    story_id: hlm_panci
    chapter_or_section: "正冊"
    text_span: P0025-P0026
    summary: 秦可卿判詞——情字的堆疊與空間歸因。(1) 情天情海幻情深——連續三個「情」字疊加：天+海+深，以空間的廣度（天、海）和維度（深）度量情的規模，情即秦可卿之「秦」的諧音嵌入。(2) 情既相逢必主淫——兩個「情」相遇必然導向淫，將情與淫的因果關係編碼為必然性。(3) 漫言不肖皆榮出——不要說不肖子孫都出自榮國府，將輿論歸因指向榮府。(4) 造釁開端實在寧——罪孽的真正開端在寧國府，以空間歸因將賈府衰敗的源頭指向寧府（秦可卿與賈珍的亂倫）。情→淫→榮出→寧開，從情感泛濫到道德崩潰的因果鏈，最終以寧國府作為一切罪孽的地理起點。秦可卿之死是小說敘事的真正開端（第十三回），判詞因此成為全書結構的基因密碼。
    participants: [秦可卿, 情天, 情海, 榮府, 寧府]
