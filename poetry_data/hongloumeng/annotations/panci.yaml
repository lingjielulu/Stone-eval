    trigger_event_id: PC_E09
    payoff_event_id: PC_E09
    payoff_text_span: P0016
    payoff_summary: 一載赴黃粱——中山狼對花柳的暴力在黃粱一夢的典故中完成最終回收。花柳的嬌弱被中山狼的猙獰吞噬，夢的短暫性回收了迎春婚後一年的生命——從金閨到黃粱，從花柳到死亡，以動植物暴力和夢的虛無雙重編碼婚姻悲劇。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 迎春判詞以動物（中山狼）+植物（花柳）+夢（黃粱）構成跨物種的暴力鏈——中山狼是施暴者，花柳是被害者，黃粱是結局，是全部判詞中唯一的動植物暴力隱喻。
