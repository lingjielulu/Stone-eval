metadata:
  story_id: hlm_panci
  title: "金陵十二釵判詞全集（含又副冊、副冊）"
  author: "曹雪芹"
  language: zh
  source_text_path: poetry_data/hongloumeng/normalized_texts/panci.txt
  source_url: https://zh.wikisource.org/wiki/紅樓夢/第005回
  copyright_status: public_domain
  genre: classical_chinese_poetry_imagery_stacking
  length_level: short
  structure_type: [symbolic, psychological]
annotation_guide:
  focus:
    - 標注全部十四首判詞的意象堆疊——每首判詞將物件、自然意象、典故、諧音雙關堆疊為命運密碼。
    - 每首判詞至少包含一層姓名嵌入：玉帶林→林黛玉、金簪雪→薛寶釵、凡鳥→鳳、兩地孤木→桂、湘江楚雲→湘雲等。
    - 標注又副冊→副冊→正冊的層級結構：丫鬟（晴雯、襲人）→半主半僕（香菱）→主子小姐（十二釵正冊），命運預告的遞進關係。
    - 標注三春意象鏈：元春→迎春→探春→惜春，以春的意象建立四姐妹命運的互文網絡。
    - 標注意象堆疊的四種機制：(1) 物件+空間（玉帶+林中、金簪+雪裡）；(2) 自然意象+情感（榴花+宮闈、湘江+楚雲）；(3) 典故轉化（中山狼、停機德、詠絮才）；(4) 字謎拆解（凡鳥=鳳、一從二令三人木=休、兩地孤木=桂）。
  boundary_notes:
    - 判詞是《紅樓夢》全書最核心的伏筆裝置，所有十四首判詞均以意象隱喻預告人物命運。
    - 每首判詞中的意象堆疊既是當下閱讀的詩意體驗，也是對小說後續數十回情節的壓縮式預告。
    - 判詞中的人物不是行動者而是被預言者，動機與情感狀態在標注中需以「判詞揭示」而非「人物行為」的角度標注。
events:
  - event_id: PC_E01
    story_id: hlm_panci
    chapter_or_section: "又副冊"
    text_span: P0001
    summary: 晴雯判詞——意象堆疊：霽月（雨後明月）與彩雲（絢麗雲彩）構成「難逢」與「易散」的雙重短暫性隱喻，以天象之物預告晴雯美好的本質與夭亡的命運。風流靈巧（性格才華）與壽夭誹謗（社會迫害）形成因果對撞——珍貴之物必遭摧折。多情公子（寶玉）的牽念落空，點明晴雯與寶玉之間有緣無終的悲劇結構。
    participants: [霽月, 彩雲, 晴雯, 寶玉, 誹謗]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: PC_E02
    story_id: hlm_panci
    chapter_or_section: "又副冊"
    text_span: P0002-P0003
    summary: 襲人判詞——意象堆疊：桂與蘭均為香草，暗嵌襲人本姓「花」，以花香比附其溫柔品性。溫柔的品性（枉自）與公子的無緣（空雲）形成虛詞對——「枉自」「空雲」「誰知」三層否定將美好品質推向徒勞。優伶（蔣玉菡）有福承接了本屬公子（寶玉）的姻緣，以人物置換完成襲人改嫁的命運預告。
    participants: [襲人, 優伶, 公子, 桂, 蘭, 寶玉, 蔣玉菡]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
