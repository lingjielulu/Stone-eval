    payoff_event_id: PC_E11
    payoff_text_span: P0020
    payoff_summary: 哭向金陵事更哀——凡鳥在末世的才幹被一從二令三人木的婚姻悲劇瓦解，最終以哭向金陵的空間移動完成命運回收。凡鳥（鳳）本應翱翔於盛世，卻在末世被休棄、在金陵以淚終結，字謎的逐步拆解即命運的漸次崩潰。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 王熙鳳判詞以字謎為核心意象堆疊手段——凡鳥=鳳（嵌入姓名）、一從二令三人木=休（嵌入婚姻命運），拆字法是將語言本身轉化為命運密碼的終極意象堆疊。
