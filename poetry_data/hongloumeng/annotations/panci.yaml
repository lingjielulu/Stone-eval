    confidence: {value: high}
    explanation: 李紈判詞以植物生命週期（桃李結子→蘭花盛開）編碼人物命運——結子是成功（兒子功名），但結子完的「完」字將成功與終結並置，蘭花的盛開與母親的凋零同步。
  - foreshadowing_id: PC_F15
    story_id: hlm_panci
    foreshadowing_text_span: P0025-P0026
    foreshadowing_summary: 情天情海幻情深，情既相逢必主淫，造釁開端實在寧——三「情」疊加（天+海+深）預告秦可卿的命運：情字的泛濫→淫亂的必然→寧府的罪責，空間隱喻（天、海、寧府）的逐步收縮從宏大的情天到具體的寧府，將賈府衰敗的源頭地理編碼為寧國府的淫亂。
    foreshadowing_type: symbolic
    trigger_event_id: PC_E14
    payoff_event_id: PC_E14
    payoff_text_span: P0026
    payoff_summary: 造釁開端實在寧——情天情海的鋪陳在寧府的空間定點中回收。情的泛濫從天與海的無限廣度收縮為寧府的具體罪責，秦可卿之名（情可輕？情可傾？）的情字遊戲，在淫亂中被徹底坐實——情即秦，秦即罪，寧府即罪的空間起點。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 秦可卿判詞以「情」字的重複堆疊為核心手段——連續三個情字從天→海→深層層遞進，將抽象情感物化為可量度的空間（天、海、深），再以寧府的具體空間回收所有抽象隱喻，是全書中最精密的意象堆疊→空間回收結構。
