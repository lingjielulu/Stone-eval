causal_edges:
  - edge_id: HP_C01
    story_id: honglou_panci
    source_event_id: HP_E01
    target_event_id: HP_E02
    relation_type: reveals
    strength: {value: strong}
    evidence_text_span: P0001-P0002
    explanation: 前兩句以典故建立人物評判框架（德與才），後兩句以意象堆疊揭示人物命運結局（掛與埋）。
  - edge_id: HP_C02
    story_id: honglou_panci
    source_event_id: HP_E02
    target_event_id: HP_E01
    relation_type: symbolically_echoes
    strength: {value: medium}
    evidence_text_span: P0001-P0002
    explanation: 玉帶林中掛反照詠絮才的悲劇——高才終被棄置；金簪雪裡埋反照停機德的虛妄——賢德終被埋沒。
foreshadowing_units:
  - foreshadowing_id: HP_F01
    story_id: honglou_panci
    foreshadowing_text_span: P0002
    foreshadowing_summary: 玉帶林中掛——玉帶作為高潔之物被棄置林中，以物件+空間的意象堆疊方式預告林黛玉的命運：高潔才情終被棄置，如美玉懸掛林中無人取用。
    foreshadowing_type: symbolic
    trigger_event_id: HP_E02
    payoff_event_id: HP_E02
    payoff_text_span: P0002
    payoff_summary: 玉帶林中掛——本身就是伏筆與預言的一體化：意象的呈現即命運的預告，無需分離伏筆與回收。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 判詞以物件意象直接預告人物命運，其「伏筆-回收」結構存在於詩內意象與小說後續情節之間，而非詩內前後句之間。
  - foreshadowing_id: HP_F02
    story_id: honglou_panci
    foreshadowing_text_span: P0002
    foreshadowing_summary: 金簪雪裡埋——金簪作為貴重之物被深埋雪中，以物件+空間的意象堆疊方式預告薛寶釵的命運：賢德與富貴終被冷落埋沒，如金簪深埋雪下無人知曉。
    foreshadowing_type: symbolic
    trigger_event_id: HP_E02
    payoff_event_id: HP_E02
    payoff_text_span: P0002
    payoff_summary: 金簪雪裡埋——意象呈現即命運預告，物件（金簪）的價值與空間（雪埋）的冷寂構成悲劇性反差。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 金簪意象既嵌入寶釵姓名（金簪雪→薛），又以埋藏的空間動詞暗示其最終命運的冷落與孤寂。
