metadata:
  story_id: honglou_panci
  title: "金陵十二釵正冊判詞（黛玉、寶釵合詠）"
  author: "曹雪芹"
  language: zh
  source_text_path: data/foreshadow_causality_benchmark/poetry/hongloumeng/normalized_texts/honglou_panci.txt
  source_url: https://zh.wikisource.org/wiki/紅樓夢/第005回
  copyright_status: public_domain
  genre: classical_chinese_poetry_imagery_stack
  length_level: short
  structure_type: [symbolic, psychological]
annotation_guide:
  focus:
    - 標注「玉帶林中掛，金簪雪裡埋」的雙重意象堆疊——物件（玉帶、金簪）與空間（林中、雪裡）結合構成命運隱喻。
    - 每句同時包含人物姓名雙關：玉帶林→林黛玉，金簪雪→薛寶釵。
    - 前兩句「可嘆停機德，堪憐詠絮才」以典故建立人物評判框架。
  boundary_notes:
    - 判詞是《紅樓夢》伏筆系統的核心，全部十二釵判詞均以意象隱喻預告人物命運。
    - 此處僅取黛玉寶釵合詠的兩組核心意象，後續可擴展至全部判詞。
