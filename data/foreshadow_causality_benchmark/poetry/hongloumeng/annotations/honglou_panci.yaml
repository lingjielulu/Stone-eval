    summary: 命運意象堆疊——玉帶林中掛（黛玉命運：玉帶—高潔之物—被棄置林中，姓名嵌入「玉帶林」→林黛玉），金簪雪裡埋（寶釵命運：金簪—貴重之物—被深埋雪中，姓名嵌入「金簪雪」→薛寶釵）。
    participants: [玉帶, 林, 金簪, 雪]
    location: 太虛幻境預示
    time: 未來命運
    event_type: symbolic
