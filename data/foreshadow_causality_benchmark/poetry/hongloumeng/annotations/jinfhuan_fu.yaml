metadata:
  story_id: hlm_jinfhuan
  title: "警幻仙子詩賦"
  author: "曹雪芹"
  language: zh
  source_text_path: data/foreshadow_causality_benchmark/poetry/hongloumeng/normalized_texts/jinfhuan_fu.txt
  source_url: https://zh.wikisource.org/wiki/紅樓夢/第005回
  copyright_status: public_domain
  genre: classical_chinese_poetry_imagery_stacking
  length_level: short
  structure_type: [symbolic, psychological]
annotation_guide:
  focus:
    - 標注警幻仙子歌（春夢/飛花）作為全篇哲學基調——以轉瞬即逝的意象建立「浮生若夢」的主題框架。
    - 將警幻仙子賦分為五組意象群逐層標注：出場容顏→身姿服飾→抽象美質→自然本質喻象→仙凡對比歸屬，展現賦體「意象堆疊」的結構特徵。
    - 標注宴飲聯句中瓊漿/玉液/玻璃盞/琥珀杯四重珍貴物件意象與前文虛幻主題之間的張力。
  boundary_notes:
    - 賦體以平行對偶句結構展開，每組對偶各自堆疊自然/物件意象，標注時以意象群為事件單位而非逐句拆分。
    - 警幻仙子歌為全第五回的哲學序曲，其「春夢/飛花」意象與後續紅樓夢曲十二支（尤其是飛鳥各投林）形成跨文本伏筆鏈。
    - 賦中大量自然意象（春梅、秋蕙、松、霞、龍、月等）並非客觀景物描寫，均為比喻仙子形神之喻體。
events:
  - event_id: JF_E01
    story_id: hlm_jinfhuan
    chapter_or_section: "警幻仙子歌"
    text_span: P0001-P0002
    summary: 警幻仙子歌——春夢隨去散，飛花逐水流：以春夢易散、飛花逐水的轉瞬意象宣告浮生歡樂皆為虛幻。寄言眾兒女，何必覓閒愁：以勸誡口吻點題，為全篇建立「繁華終將消逝」的哲學基調。
    participants: [警幻仙子, 眾兒女]
    location: 太虛幻境
    time: 夢境開端
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: JF_E02
    story_id: hlm_jinfhuan
    chapter_or_section: "警幻仙子賦·第一組"
    text_span: P0003-P0005
    summary: 仙子出場與容顏——方離柳塢，乍出花房：以植物空間（柳塢/花房）標識仙子出場的仙源起點。鳥驚庭樹，影度迴廊：以鳥驚飛與影流轉暗示其絕世之美對自然的震動。仙袂飄而聞麝蘭之馥郁，荷衣動而聽環珮之鏗鏘：以嗅覺（麝香蘭花）與聽覺（環珮鏗鏘）雙重感官意象疊加仙子的芬芳與華貴。靨笑春桃、雲髻堆翠、唇綻櫻顆、榴齒含香：以春桃/雲/翠/櫻/榴五種意象密集堆疊面容細節，建立以自然之物喻人之容的賦體修辭模式。
    participants: [警幻仙子, 鳥, 寶玉]
    location: 太虛幻境
    time: 寶玉初見警幻時
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: JF_E03
    story_id: hlm_jinfhuan
    chapter_or_section: "警幻仙子賦·第二組"
    text_span: P0006-P0008
    summary: 身姿、服飾與動態——纖腰楚楚兮風回雪舞：以風回雪舞的飄逸動感喻纖腰之柔美。珠翠的的、綠鵝黃鳴：以珠翠明光與黃綠玉鳴聲疊加視覺與聽覺的服飾意象，渲染仙子佩飾之璀璨。出沒花間兮宜嗔宜喜，徘徊池上兮若飛若揚：以花間出沒與池上徘徊的空間動態，疊加顰喜交替的情態變化，展現仙子自然流轉之美。蛾眉欲顰而未語，蓮步乍移而仍行：以「將而未、欲而仍」的懸置動態刻畫臨界狀態的韻味——眉將蹙而未語、步將行而仍止，靜中含動。
    participants: [警幻仙子, 寶玉]
    location: 太虛幻境花間池畔
    time: 寶玉凝視警幻時
    event_type: description
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: JF_E04
    story_id: hlm_jinfhuan
    chapter_or_section: "警幻仙子賦·第三組"
    text_span: P0009-P0010
    summary: 美質、華服、容貌與態度——羨良質兮冰清玉潤，慕華服兮閃爍文章：以冰之清、玉之潤喻仙子的內在品質，以閃爍的文章光華喻其服飾之美。愛容貌兮香培玉篆，比態度兮鳳翥龍翔：以香培玉篆喻容貌之精緻，以鳳翥（飛舉）龍翔（翱翔）喻其態度之超凡氣象。四句以「羨→慕→愛→比」的情感遞進，從良質至華服至容貌至態度，完成由外而內、由物到神的觀賞層次遞進。
    participants: [警幻仙子, 寶玉]
    location: 太虛幻境
    time: 寶玉審視警幻全貌時
    event_type: description
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: JF_E05
    story_id: hlm_jinfhuan
    chapter_or_section: "警幻仙子賦·第四組"
    text_span: P0011-P0013
    summary: 自然意象喻其本質——六組設問句（其素若何/其潔若何/其靜若何/其豔若何/其文若何/其神若何）結構整飭，每問以一組自然意象作答：素（春梅綻雪）、潔（秋蕙披霜）、靜（松生空谷）、豔（霞映澄塘）、文（龍遊曲沼）、神（月射寒江）。六組意象橫跨四季（春梅/秋蕙）、山水（空谷/曲沼/澄塘/寒江）、天文（霞/月）、動植物（松/龍），以天地萬象的全部精華疊加於一人身上，完成賦體「窮盡一切自然之美以喻人之美」的修辭極致。
    participants: [警幻仙子, 自然意象]
    location: 太虛幻境（意象空間）
    time: 讚美高潮
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: JF_E06
    story_id: hlm_jinfhuan
    chapter_or_section: "警幻仙子賦·第五組"
    text_span: P0014-P0015
    summary: 仙凡對比與神境歸屬——遠慚西子，近愧王嬙：以古代最具聲名的美人（西施、王昭君）反襯警幻之美，言其使西子王嬙亦自慚形穢。生於孰地？降自何方？：以追問姿態將仙子來源指向不可知的神境。若非宴罷歸來，瑤池不二；定應吹簫引去，紫府無雙者也：以雙重推測句（若非……定應……）斷言仙子若非瑤池西王母宴罷歸來即是紫府仙人吹簫接引而去，以仙界最高處所（瑤池/紫府）歸屬完成對仙子神格的終極確認。
    participants: [警幻仙子, 西子, 王嬙]
    location: 太虛幻境 → 瑤池/紫府（意象延伸）
    time: 歸屬確認時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: JF_E07
    story_id: hlm_jinfhuan
    chapter_or_section: "宴飲聯句"
    text_span: P0016
    summary: 宴飲聯句——瓊漿滿泛玻璃盞，玉液濃斟琥珀杯：以四重珍貴物件意象（瓊漿/玻璃盞/玉液/琥珀杯）對偶疊加，渲染太虛幻境宴飲的奢華與不真實性。玻璃盞的透明與琥珀杯的溫潤形成視覺質感的對比，瓊漿玉液皆為傳說中仙人之飲，暗示此宴非人間所有，為寶玉即將聆聽紅樓夢曲的儀式場景。
    participants: [警幻仙子, 寶玉, 仙姬]
    location: 太虛幻境宴席
    time: 宴飲時刻
    event_type: description
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
causal_edges:
  - edge_id: JF_C01
    story_id: hlm_jinfhuan
    source_event_id: JF_E01
    target_event_id: JF_E02
    relation_type: establishes
    strength: {value: strong}
    evidence_text_span: P0001-P0005
    explanation: 警幻仙子歌以「春夢飛花」建立浮生若夢的哲學基調，仙子賦的出場描寫在此基調之上展開——絕世之美出現於虛幻之境的框架內，暗示一切繁華描寫終將歸於歌中所言的「散去」。
  - edge_id: JF_C02
    story_id: hlm_jinfhuan
    source_event_id: JF_E02
    target_event_id: JF_E03
    relation_type: reveals
    strength: {value: strong}
    evidence_text_span: P0003-P0008
    explanation: 面容與香氣的描寫向身姿與服飾延伸——由靜態容顏（春桃/櫻顆/榴齒）遞進至動態身姿（纖腰/雪舞/蓮步），完成由面部特寫至全身掃描的觀賞視角推進。
  - edge_id: JF_C03
    story_id: hlm_jinfhuan
    source_event_id: JF_E03
    target_event_id: JF_E04
    relation_type: reveals
    strength: {value: medium}
    evidence_text_span: P0006-P0010
    explanation: 具體身姿服飾的描寫過渡至抽象品質的讚歎——從看得見的纖腰珠翠（形）到需要體會的冰清玉潤（質），由外顯之美深入到內藏之德。
  - edge_id: JF_C04
    story_id: hlm_jinfhuan
    source_event_id: JF_E04
    target_event_id: JF_E05
    relation_type: elaborates
    strength: {value: strong}
    evidence_text_span: P0009-P0013
    explanation: 抽象品質判斷（冰清玉潤/香培玉篆）需以具體自然意象展開論證——六組「其X若何」的設問與回答就是將JF_E04提出的抽象品質逐項對應為自然界的具體景象，完成「以象證質」的賦體修辭邏輯。
  - edge_id: JF_C05
    story_id: hlm_jinfhuan
    source_event_id: JF_E05
    target_event_id: JF_E06
    relation_type: reveals
    strength: {value: strong}
    evidence_text_span: P0011-P0015
    explanation: 自然意象的鋪陳到達極限後，轉向歷史人物對比與神境歸屬——從以自然之美喻人之美（JF_E05）到以人之美反襯仙之美（西子王嬙），再到以仙界空間確定其身份（瑤池紫府），完成由自然→人間→仙界的層級跨越。
  - edge_id: JF_C06
    story_id: hlm_jinfhuan
    source_event_id: JF_E06
    target_event_id: JF_E07
    relation_type: enables
    strength: {value: medium}
    evidence_text_span: P0014-P0016
    explanation: 仙子的神格確認（瑤池紫府中人）使其具備主持仙界宴飲的資格，宴飲聯句是其仙界身份的自然延伸——瓊漿玉液正是瑤池紫府應有之物，賦的結尾為宴飲描寫提供了場景合法性。
  - edge_id: JF_C07
    story_id: hlm_jinfhuan
    source_event_id: JF_E01
    target_event_id: JF_E07
    relation_type: symbolically_echoes
    strength: {value: medium}
    evidence_text_span: P0001-P0016
    explanation: 歌中「春夢去散、飛花逐水」的消逝主題與宴飲聯句中「瓊漿滿泛、玉液濃斟」的繁華場景形成結構性張力——正在極度渲染的奢華宴飲，正是歌中所預言的終將散去之物，首尾呼應構成了「幻境中的幻境」的嵌套結構。
foreshadowing_units:
  - foreshadowing_id: JF_F01
    story_id: hlm_jinfhuan
    foreshadowing_text_span: P0001
    foreshadowing_summary: 春夢隨去散，飛花逐水流——以春夢之易散、飛花之逐水建立核心伏筆意象：人間歡樂如春夢般短暫易醒，如飛花般隨水流逝不可挽留。
    foreshadowing_type: symbolic
    trigger_event_id: JF_E01
    payoff_event_id: JF_E01
    payoff_text_span: P0001
    payoff_summary: 春夢飛花意象是第五回全部預言的哲學前奏——其「回收」不在賦中而在後文的紅樓夢曲十二支，尤其是飛鳥各投林：「為官的，家業凋零；富貴的，金銀散盡……好一似食盡鳥投林，落了片白茫茫大地真乾淨」，正是春夢散、飛花流的宏大展開。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 春夢飛花是《紅樓夢》整體伏筆系統的初始意象單元，它以最簡潔的形式預演了全書「繁華歸於虛無」的終極主題，為後續所有判詞、曲子中的命運預告提供了抒情基調。
  - foreshadowing_id: JF_F02
    story_id: hlm_jinfhuan
    foreshadowing_text_span: P0003-P0015
    foreshadowing_summary: 警幻仙子賦的密集意象堆疊——從柳塢花房的出場到瑤池紫府的歸屬確認，以數十種自然意象（柳/花/鳥/麝蘭/環珮/春桃/雲翠/櫻/榴/風雪/珠翠/花間/池上/蛾眉/蓮步/冰玉/鳳龍/春梅/秋蕙/松/霞/龍/月/瑤池/紫府）密集堆疊，構建了一個以自然萬象之精華編織的審美世界。
    foreshadowing_type: symbolic
    trigger_event_id: JF_E02
    payoff_event_id: JF_E02
    payoff_text_span: P0003-P0015
    payoff_summary: 賦中建立的意象世界就是寶玉夢入太虛幻境時所進入的審美語境——這些自然意象的密度和華麗程度直接等同於太虛幻境對寶玉感官的衝擊強度，是寶玉「墮入迷津」前所見的最後一個完整的美的世界。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 賦中每一組自然意象都是太虛幻境審美體系的一個構成單元，它們共同建立了一個「以自然之美喻仙之美」的完整修辭宇宙，寶玉在進入此宇宙後才得以接受紅樓夢曲的啟示——這個意象世界是啟示的前提條件。
  - foreshadowing_id: JF_F03
    story_id: hlm_jinfhuan
    foreshadowing_text_span: P0014-P0015
    foreshadowing_summary: 瑤池不二，紫府無雙——以仙界至高空間（瑤池為西王母所居，紫府為仙人所居）歸屬仙子，同時「不二/無雙」的絕對化修辭暗示此美不可再現於人間。
    foreshadowing_type: symbolic
    trigger_event_id: JF_E06
    payoff_event_id: JF_E06
    payoff_text_span: P0014-P0015
    payoff_summary: 瑤池紫府的空間歸屬是伏筆——它預示了警幻仙子及其所在的太虛幻境終將成為寶玉無法重返的彼岸世界。賦中越是將其描寫為「無雙/不二」，越暗示此美在人間（大觀園）的不可複製性。
    payoff_type: symbolic
    confidence: {value: medium}
    explanation: 仙界空間的絕對化修辭構成一個「不可抵達性」伏筆——寶玉在大觀園中建立的審美世界是太虛幻境的世俗投影，但賦已預先宣告了這兩者之間不可跨越的距離。
characters:
  - character_id: JF_CH01
    story_id: hlm_jinfhuan
    name: 警幻仙子
    role: 太虛幻境之主／命運啟示者／審美客體
    stable_traits: [絕美, 超凡, 威嚴, 啟示性]
    current_motivation_by_event:
      - event_id: JF_E01
        motivation: 以歌點化——向眾兒女（包括寶玉）宣告浮生虛幻的真理，為後續命運啟示鋪墊哲學前提。
        knowledge_state: 知曉全部人物的命運，掌握太虛幻境的運作規則。
        emotional_state: 莊嚴、悲憫、超然。
        goal: 使寶玉從「繁華夢」中醒悟，接受命運啟示。
      - event_id: JF_E06
        motivation: 完成女神身份的確認——通過與歷史美人對比及仙界空間歸屬，確立其在太虛幻境中的絕對權威，為後續主持紅樓夢曲的儀式建立合法性。
        knowledge_state: 知曉自身作為仙界使者的身份與使命。
        emotional_state: 神聖、不可接近。
        goal: 以完美的審美形象建立威信，使寶玉信服。
  - character_id: JF_CH02
    story_id: hlm_jinfhuan
    name: 賈寶玉
    role: 夢遊者／凝視者／被啟示對象
    stable_traits: [多情, 好奇, 執迷, 未悟]
    current_motivation_by_event:
      - event_id: JF_E02
        motivation: 凝視審美對象——在太虛幻境中初見警幻仙子，被其絕世之美吸引，作為凝視者記錄（賦即其凝視之產物）。
        knowledge_state: 初入太虛幻境，不知身在夢中，對眼前的仙子與景象充滿好奇但未能理解其象徵含義。
        emotional_state: 驚豔、嚮往、困惑。
        goal: 理解眼前的景象，追隨警幻仙子的引導。
      - event_id: JF_E07
        motivation: 參與仙界宴飲——接受警幻仙子提供的瓊漿玉液，在極致奢華的感官體驗中即將迎來紅樓夢曲的命運啟示。
        knowledge_state: 仍處於「夢中不知夢」的狀態，將要接受命運啟示但尚未準備好理解它。
        emotional_state: 沉醉、期待。
        goal: 享受仙界之美，繼續探索太虛幻境的秘密。
