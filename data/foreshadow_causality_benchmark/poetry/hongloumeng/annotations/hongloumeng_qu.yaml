  - event_id: QU_E07
    story_id: hlm_qu
    chapter_or_section: 世難容
    text_span: P0007
    summary: 妙玉的世難容——氣質美如蘭（蘭花意象：清雅孤高）→才華馥比仙（仙人意象：超塵脫俗，蘭與仙雙重高潔物象疊加）→孤癖人皆罕（社會隔離的必然結果）→啖肉食腥膻／綺羅俗厭（對世俗的生理性厭惡堆疊：肉=腥膻味覺厭惡，綺羅=視覺厭惡）→好高人愈妒／過潔世同嫌（道德困境的雙重對偶：好高→人妒，過潔→世嫌）→青燈古殿（佛門清冷空間：青燈+古殿，昏暗寂靜）↔紅粉朱樓春色闌（世俗繁華空間：紅粉+朱樓+春色，色彩熱烈卻已闌珊，兩種人生道路的空間對照）→風塵骯髒（淪落世俗的骯髒意象）→白玉遭泥陷（終極摧毀意象：白玉=純潔本體，泥陷=污染毀滅，以物象的極端反差收束全曲）。從蘭/仙→青燈→風塵→白玉泥陷，意象經歷了從高潔到毀滅的四階段遞進降級。
    participants: [妙玉, 蘭, 仙, 青燈古殿, 白玉]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: QU_E08
    story_id: hlm_qu
    chapter_or_section: 喜冤家
    text_span: P0008
    summary: 賈迎春的喜冤家——中山狼（忘恩負義典故：東郭先生與中山狼，下山反噬恩人為核心意象）→無情獸（去人性化疊加，狼+獸雙重獸性標記）→驕奢淫蕩貪歡媾（惡行五動詞連續堆疊：驕+奢+淫+蕩+貪，惡的最大密度呈現）→侯門艷質↔蒲柳（價值反轉對照：侯門的尊貴艷質被視為蒲柳般輕賤）→公府千金↔下流（身份反轉對照：千金淪為下流）→芳魂艷魄／一載蕩悠悠（死亡意象：芳魂+艷魄以美收葬，一載蕩悠悠暗示婚後一年即死）。以狼/獸→艷質/千金→蒲柳/下流→芳魂/艷魄的物象降級鏈結構全曲。
    participants: [賈迎春, 中山狼, 蒲柳, 芳魂]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: QU_E09
    story_id: hlm_qu
    chapter_or_section: 虛花悟
    text_span: P0009
    summary: 賈惜春的虛花悟（十四曲中意象最繁密的段落之一）——三春勘破（看破三春：春=元春探春惜春三姊妹姓名雙關，亦指青春）→桃紅柳綠（繁華表象：自然色彩堆疊）→韶華打滅（主動捨棄青春）→清淡天和（追求清淨無為）→天上夭桃／雲中杏蕊（天上+雲中=仙界虛幻繁華，夭桃+杏蕊=花期短暫）→秋捱過（凋零的必然命運）→白楊村人嗚咽／青楓林鬼吟哦（死亡空間的雙重堆疊：白楊+嗚咽以樹喻人、青楓+吟哦以聲寫鬼，墓地意象的空間疊加）→衰草遮墳墓（衰草+墳墓，荒蕪收束）→昨貧今富／春榮秋謝（貧富興衰的循環對偶）→生關死劫（終極困境的命名）→西方寶樹／長生果（佛門解脫意象：寶樹=婆娑樹、長生果=涅槃境界）。全曲經歷五重意象遞進：繁華(桃紅柳綠)→看破(韶華打滅)→死亡(白楊青楓墳墓)→輪迴(貧富春榮秋謝)→解脫(寶樹長生果)。
    participants: [賈惜春, 三春, 桃紅柳綠, 白楊, 青楓, 衰草, 墳墓, 寶樹, 長生果]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: QU_E10
    story_id: hlm_qu
    chapter_or_section: 聰明累
    text_span: P0010
    summary: 王熙鳳的聰明累——機關算盡（計謀的極致化意象：機關=心機+算計，雙重智力堆疊）→卿卿性命（反噬：算盡他人反喪己命，從施動者變為承受者）→心碎／性空靈（內心瓦解：心碎=生理意象、性空靈=精神意象，雙層崩塌）→家富人寧→家亡人散各奔騰（命運反轉：富→亡、寧→散、奔騰=四散奔逃）→意懸懸半世心（焦慮心境）／蕩悠悠三更夢（虛幻夢境，心境與夢境雙重對照）→大廈傾（結構性崩塌意象，大廈=賈府的空間隱喻）→燈將盡（熄滅意象，燈=生命/家運的時間隱喻）→歡喜→悲辛（情感極性反轉收束）。大廈傾+燈將盡構成空間與時間的雙重毀滅意象疊加。
    participants: [王熙鳳, 機關, 大廈, 燈]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
