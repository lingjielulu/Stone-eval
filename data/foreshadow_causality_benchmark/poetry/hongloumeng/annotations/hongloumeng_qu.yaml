  - event_id: QU_E13
    story_id: hlm_qu
    chapter_or_section: 好事終
    text_span: P0013
    summary: 秦可卿的好事終——畫梁春盡（華美空間+春意消散：畫梁=建築之美、春盡=時間終結，空間+時間雙重疊加）→落香塵（香塵=秦可卿名字嵌入，香→塵喻生命降格，從芬芳墮入塵土）→擅風情／秉月貌（美色與情欲的本源性意象：擅風情=情欲天資、秉月貌=容貌天賦，天資成為禍根）→敗家的根本（道德判斷的直接宣告）→箕裘頹墮（祖先基業崩壞：箕裘=父祖事業的物化符號）→家事消亡（家族徹底毀滅）→首罪寧（歸罪於寧國府，空間定點指認）→宿孽總因情（終極歸因：情=一切罪孽根源，將所有毀滅歸結為一個字）。全曲意象經歷：華美(畫梁春盡)→墮落(落香塵)→禍根(風情月貌)→毀滅(箕裘頹墮/家事消亡)→歸因(宿孽因情)。
    participants: [秦可卿, 畫梁, 香塵, 箕裘]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
