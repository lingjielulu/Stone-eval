  - event_id: QU_E02
    story_id: hlm_qu
    chapter_or_section: 終身誤
    text_span: P0002
    summary: 賈寶玉的終身誤——金玉良緣（世俗公認：金鎖+寶玉）↔木石前盟（靈魂契約：絳珠仙草+神瑛侍者）→山中高士晶瑩雪（薛寶釵：雪=薛諧音、晶瑩=冷美人、高士=道德完人）→世外仙姝寂寞林（林黛玉：林=姓、仙姝=超凡脫俗、寂寞=孤傲命運）→齊眉舉案（舉案齊眉典故，世俗夫妻禮儀）→意難平（情感終局）。金玉vs木石為第一層對立，雪vs林為第二層物性對立（晶瑩冷vs寂寞孤，高士vs仙姝），最終以意難平收束。
    participants: [賈寶玉, 薛寶釵, 林黛玉, 金玉良緣, 木石前盟, 雪, 林]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: QU_E03
    story_id: hlm_qu
    chapter_or_section: 枉凝眉
    text_span: P0003
    summary: 林黛玉的枉凝眉（十四曲中意象密度最高）——閬苑仙葩（仙苑奇花→黛玉前世絳珠仙草）↔美玉無瑕（完美無瑕之玉→寶玉）→奇緣（命中注定相遇）↔心事終虛話（注定成空）→水中月（虛幻不可撈取）→鏡中花（虛幻不可觸及，月與花雙重虛幻意象層疊）→淚珠兒從秋流到冬、春流到夏（以淚為線索貫穿四季循環，暗示黛玉以淚還債的命運主線）。仙葩/美玉/水月/鏡花/淚/四季，六組意象以對照與遞進結構堆疊，密度為十四曲之冠。
    participants: [林黛玉, 賈寶玉, 仙葩, 美玉, 水中月, 鏡中花, 淚珠兒]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: QU_E04
    story_id: hlm_qu
    chapter_or_section: 恨無常
    text_span: P0004
    summary: 賈元春的恨無常——榮華（極盛富貴）↔無常（佛教死亡概念，瞬間突變）→萬事全拋／芳魂銷耗（生命消散的雙重具象化）→路遠山高（空間隔絕，宮中與家鄉的不可跨越）→夢裡尋告（夢境虛幻與遺言實質的張力）→黃泉（死亡終點）→退步抽身早（政治勸誡，以退為保的智慧）。榮華→無常→黃泉三階段構成榮→衰→亡的意象遞進曲線。
    participants: [賈元春, 榮華, 無常, 黃泉]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: QU_E05
    story_id: hlm_qu
    chapter_or_section: 分骨肉
    text_span: P0005
    summary: 賈探春的分骨肉——一帆風雨（漂泊意象：帆+風雨雙重逆境堆疊）→路三千（空間距離的極致誇張）→骨肉家園（骨肉=血緣之暖、家園=歸屬之暖）↔拋閃（撕裂動作，暖意象被冷動作切斷）→殘年／懸念（父母老衰與牽掛對偶）→窮通／離合（命運的雙重對偶：窮vs通、離vs合）→分兩地／保平安（分離後的平靜祈願）→奴去也／莫牽連（親口告別，聲口意象的最終收束）。空間擴展（一帆→路三千→分兩地）與情感收斂（骨肉拋閃→保平安→莫牽連）形成反向張力。
    participants: [賈探春, 風雨, 骨肉家園]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
