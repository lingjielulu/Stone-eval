  - event_id: QU_E11
    story_id: hlm_qu
    chapter_or_section: 留餘慶
    text_span: P0011
    summary: 巧姐的留餘慶——留餘慶（因果福報的命名式疊加，重複兩次以強調）→恩人（拯救者的出現）→娘親／陰功（母愛庇護轉化為陰間功德，前世今生因果連接）→濟困扶窮（正面行為主張）↔愛銀錢忘骨肉／狠舅奸兄（反面形象堆疊：銀錢+骨肉+狠+奸，親屬關係被利益徹底扭曲的四重負面意象）→乘除加減（數學意象，因果報應的量化隱喻：善有善報如算式平衡）→上有蒼穹（天理/命運的最高裁決者，空間從人間數學上升至蒼穹天理）。
    participants: [巧姐, 恩人, 娘親, 蒼穹]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: QU_E12
    story_id: hlm_qu
    chapter_or_section: 晚韶華
    text_span: P0012
    summary: 李紈的晚韶華——鏡裡恩情（鏡中虛幻：恩情如鏡中影不可捉摸）→夢裡功名（夢中虛幻：功名如夢一場，鏡與夢雙重虛幻意象疊加）→美韶華去之何迅（青春消逝的速度感）→繡帳鴛衾（婚床溫馨→被「再休提」否定抹除）→珠冠鳳襖（榮華穿戴的物質巔峰：珠冠+鳳襖）↔無常性命（榮華不敵死亡，物質vs虛無）→簪纓（高官冠飾）→金印（權力象徵）→爵祿高登（權力極致上升）↔黃泉路近（死亡驟然逼近，頂峰即懸崖）→虛名兒後人欽敬（終極判斷：一切功名榮譽只是虛名）。三階段意象遞進：鏡/夢的虛空→珠冠/鳳襖/簪纓/金印的極端榮華→黃泉路近/虛名的死亡解構。
    participants: [李紈, 鏡, 夢, 珠冠, 鳳襖, 簪纓, 金印, 黃泉]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
    certainty: {value: certain}
