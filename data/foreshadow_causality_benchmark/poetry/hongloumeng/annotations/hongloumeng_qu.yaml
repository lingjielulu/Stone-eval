metadata:
  story_id: hlm_qu
  title: "紅樓夢曲十四支"
  author: "曹雪芹"
  language: zh
  source_text_path: data/foreshadow_causality_benchmark/poetry/hongloumeng/normalized_texts/hongloumeng_qu.txt
  source_url: https://zh.wikisource.org/wiki/紅樓夢/第005回
  copyright_status: public_domain
  genre: classical_chinese_poetry_imagery_stacking
  length_level: short
  structure_type: [symbolic, psychological]
annotation_guide:
  focus:
    - 標注每支曲子的意象堆疊（imagery stacking）——每首曲以多重意象層層遞進揭示人物命運，意象之間存在對偶、遞進、反轉關係。
    - 曲是判詞的音樂/抒情對應物，在判詞的簡潔意象基礎上擴展為更豐富的情感深度與畫面感。
    - 標注從引子→十二支→收尾的因果遞進結構：引子確立「悲金悼玉」主題→十二支展開個體命運→飛鳥各投林以集體毀滅收束。
    - 標注每曲內部意象的物性對立（如金/玉vs木/石，水中月vs鏡中花，大廈傾vs燈將盡）。
  boundary_notes:
    - 十四支曲均為太虛幻境中仙女所唱，賈寶玉為聽眾，曲子內容是對他及十二釵命運的預言性揭示。
    - 每曲是一個獨立的意象堆疊單元，適合測試多層次、多物件、多感官的因果標注。
    - 曲中人物的命運預告在小說後續章節中逐一回收，此處標注聚焦於曲子內部的意象結構與曲子之間的因果遞進。
