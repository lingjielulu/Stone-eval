    explanation: 聰明累以計算（機關）→家散（奔騰）→崩塌（大廈傾）→熄滅（燈將盡）→悲辛的完整毀滅鏈預告熙鳳命運，燈將盡的熄滅意象與大廈傾的空間崩塌形成全曲最具震懾力的毀滅雙聯畫。
  - foreshadowing_id: QU_F11
    story_id: hlm_qu
    foreshadowing_text_span: P0011
    foreshadowing_summary: 留餘慶——以娘親積得陰功→忽遇恩人的因果鏈，預告巧姐將在賈府敗落、被狠舅奸兄出賣的絕境中，因母親王熙鳳生前的偶然善舉（陰功）而意外獲救。
    foreshadowing_type: causal
    trigger_event_id: QU_E11
    payoff_event_id: QU_E11
    payoff_text_span: P0011
    payoff_summary: 留餘慶，留餘慶，忽遇恩人；幸娘親，幸娘親，積得陰功——因果報應的算式（乘除加減）在蒼穹的裁決下得到平衡：熙鳳的惡（機關算盡）導致自身毀滅，熙鳳一閃而過的善（陰功）卻救了女兒。
    payoff_type: positive
    confidence: {value: high}
    explanation: 留餘慶是十四曲中唯一以正面結局收尾的曲子，其因果鏈（陰功→恩人→得救）為整組悲劇提供了一線光明，承載著因果報應不可逃脫的道德命題。
  - foreshadowing_id: QU_F12
    story_id: hlm_qu
    foreshadowing_text_span: P0012
    foreshadowing_summary: 晚韶華——以鏡裡恩情/夢裡功名（雙重虛幻開篇）→珠冠鳳襖/簪纓金印/爵祿高登（三重榮華堆疊）→昏慘慘黃泉路近（死亡驟臨）→虛名兒後人欽敬（終極否定），預告李紈雖守節教子獲得外在榮耀，但這些榮耀在死亡面前全部化為虛名。
    foreshadowing_type: symbolic
    trigger_event_id: QU_E12
    payoff_event_id: QU_E12
    payoff_text_span: P0012
    payoff_summary: 氣昂昂頭戴簪纓，光燦燦胸懸金印，威赫赫爵祿高登——昏慘慘黃泉路近！三聲疊詞推至權力巔峰後驟然以死亡截斷，所有榮耀在黃泉路近的死亡陰影下化為一場空。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 晚韶華以鏡/夢的虛幻開端與黃泉路近的死亡收束構成環形否定結構——開始即虛幻，到頭來一切（珠冠鳳襖簪纓金印）只是虛名兒，鏡與夢的虛無被黃泉徹底坐實。
  - foreshadowing_id: QU_F13
    story_id: hlm_qu
    foreshadowing_text_span: P0013
    foreshadowing_summary: 好事終——以畫梁春盡落香塵（華美建築+春天+香味+塵土的四重疊加）→擅風情秉月貌（情慾天資→敗家的根本）→箕裘頹墮/家事消亡（家族基業崩塌）→宿孽總因情（終極歸因），預告秦可卿以風情月貌之美成為情慾的化身與犧牲，她的死是賈府從內部腐敗走向全面崩塌的開端。
    foreshadowing_type: symbolic
    trigger_event_id: QU_E13
    payoff_event_id: QU_E13
    payoff_text_span: P0013
    payoff_summary: 畫梁春盡落香塵、擅風情秉月貌便是敗家的根本、宿孽總因情——秦可卿從美（畫梁/香塵/風情/月貌）到罪（敗家/宿孽/因情）的意象降級路徑宣告：美即禍根，情即宿孽。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 好事終以香塵的姓名嵌入（秦可卿乳名兼美字可卿，香塵→可卿）與宿孽總因情的終極歸因將秦可卿定位為全書情慾罪孽的原點，她的毀滅是飛鳥各投林集體毀滅的預演。
  - foreshadowing_id: QU_F14
    story_id: hlm_qu
    foreshadowing_text_span: P0014
    foreshadowing_summary: 飛鳥各投林——以食盡鳥投林（食物耗盡→鳥獸四散，喻賈府物資/運勢耗盡後眾人各自離散）→白茫茫大地真乾淨（終極視覺清空：一片白色虛無吞噬一切），預告全書所有人物——為官的、富貴的、有恩的、無情的、欠命的、欠淚的、看破的、痴迷的——終將在賈府崩塌後走向各自歸宿，最終一切歸零。
    foreshadowing_type: thematic
    trigger_event_id: QU_E14
    payoff_event_id: QU_E14
    payoff_text_span: P0014
    payoff_summary: 好一似食盡鳥投林，落了片白茫茫大地真乾淨——食盡（資源耗盡）、鳥投林（各自離散）、白茫茫（視覺清空）、真乾淨（存在歸零），四層意象逐級推進至絕對虛無，這是十四曲全部伏筆的終極總回收。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 飛鳥各投林是整組紅樓夢曲的宏大收束——它將前十三曲每一個人物的命運預告以集體清算的方式匯總回收，從欠淚的淚已盡（黛玉）到遁入空門（惜春/寶玉）到枉送了性命（熙鳳等），再以白茫茫大地將一切歸零，完成從引子悲金悼玉到終曲萬事皆空的閉環。
