  - event_id: QU_E01
    story_id: hlm_qu
    chapter_or_section: 引子
    text_span: P0001
    summary: 紅樓夢引子——開闢鴻蒙（宇宙初開）→誰為情種（情感起源）→風月情濃（情感世界）→奈何天、傷懷日、寂寥時（時間意象三重堆疊：天→日→時逐級收縮）→試遣愚衷→悲金悼玉（核心主題：金=寶釵、玉=黛玉，悲悼雙關）。六層意象從宇宙混沌層層遞進至人間悲情，確立全曲基調。
    participants: [鴻蒙, 情種, 風月, 金, 玉]
    location: 太虛幻境
    time: 預言時刻
    event_type: revelation
