  - event_id: QU_E06
    story_id: hlm_qu
    chapter_or_section: 樂中悲
    text_span: P0006
    summary: 史湘雲的樂中悲——襁褓／父母雙亡（幼年孤苦的起點意象）→綺羅叢（榮華包裹意象）↔誰知嬌養（實則無人疼愛的反諷）→英豪闊大寬宏量（性格意象三重堆疊：英豪+闊大+寬宏）→霽月光風耀玉堂（光意象三重疊加：雨後明月+清風+玉堂輝映，以自然高潔喻人品磊落）→才貌仙郎（理想配偶）→地久天長（永恆期盼）↔雲散高唐（突變：高唐用宋玉《高唐賦》巫山雲雨典，雲散=美好破滅）→水涸湘江（湘江嵌入湘雲姓名，水涸=命運枯竭的姓名雙關）。霽月→雲散、玉堂→水涸，每一美好意象逐一被對應的反面意象破滅。
    participants: [史湘雲, 霽月, 光風, 高唐, 湘江]
    location: 太虛幻境
    time: 預言時刻
