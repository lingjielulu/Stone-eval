  - event_id: QU_E14
    story_id: hlm_qu
    chapter_or_section: 收尾
    text_span: P0014
    summary: 飛鳥各投林（集大成終曲）——為官的家業凋零／富貴的金銀散盡（社會階層逐一瓦解：官→凋零、富→散盡）→有恩的死裡逃生／無情的分明報應（因果報應的二元分配）→欠命的命已還／欠淚的淚已盡（債務清償意象：命債+淚債，淚已盡直指黛玉以淚還債的終結）→冤冤相報／分離聚合（命運的循環無常）→命短問前生／富貴也僥倖（人生無常的總括對偶）→看破的遁入空門／痴迷的枉送性命（終極分流：出世與沉淪的二元歸宿）→食盡鳥投林（核心意象：食物耗盡後鳥獸四散，喻賈府敗落後眾人離散）→白茫茫大地真乾淨（終極視覺意象：一片白色虛無，所有繁華、恩怨、情仇歸零，以徹底清空的視覺畫面收束全曲全書）。六層意象逐級遞進：階層瓦解→因果清算→債務清償→命運無常→終極分流→徹底歸零。
