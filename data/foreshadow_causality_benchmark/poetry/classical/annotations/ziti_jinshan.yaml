annotation_guide:
  focus:
    - 標注兩個比喻意象（已灰之木、不繫之舟）的堆疊：心與身分別對應靜寂與漂泊。
    - 標注三個地名（黃州、惠州、儋州）作為意象堆疊的核心——用三個貶謫地名回答平生功業。
    - 標注「問汝平生功業」是觸發事件，三個地名是 payoff——地名堆疊取代抽象回答。
  boundary_notes:
    - 黃州惠州儋州三個地名在此詩中不是單純地理，而是被壓縮為意象的苦難標記，每個地名背後都有故事。
