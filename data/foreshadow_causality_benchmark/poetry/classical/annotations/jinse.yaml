    story_id: jinse
    chapter_or_section: "首聯"
    text_span: P0001
    summary: 錦瑟無端五十弦，一弦一柱思華年——錦瑟作為起興物件，五十弦對應逝去的年華，以器物意象開啟回憶。
    participants: [錦瑟, 五十弦]
    location: 無特定
    time: 回顧華年
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: JS_E02
    story_id: jinse
    chapter_or_section: "頷聯"
    text_span: P0002
    summary: 莊生曉夢迷蝴蝶——用莊周夢蝶的典故，意象堆疊（曉夢＋蝴蝶），暗示人生如夢的迷離。
    participants: [莊生, 蝴蝶, 曉夢]
    location: 夢境
    time: 清晨夢醒
    event_type: symbolic
    certainty: {value: certain}
