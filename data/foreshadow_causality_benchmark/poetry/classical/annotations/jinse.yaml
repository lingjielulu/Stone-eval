foreshadowing_units:
  - foreshadowing_id: JS_F01
    story_id: jinse
    foreshadowing_text_span: P0002-P0003
    foreshadowing_summary: 中間兩聯四組典故意象堆疊——莊生夢蝶、望帝杜鵑、滄海珠淚、藍田玉煙——每組包含三個以上具象名詞（人物/物象/景物），以高度壓縮的典故將情感置入歷史神話的象徵系統中。
    foreshadowing_type: symbolic
    trigger_event_id: JS_E04
    payoff_event_id: JS_E06
    payoff_text_span: P0004
    payoff_summary: 此情可待成追憶，只是當時已惘然——四組意象的共同指向被揭示為惘然，所有典故意象都是惘然的象徵式預演。
    payoff_type: delayed_revelation
    confidence: {value: high}
    explanation: 中間兩聯的每個典故意象都是獨立的感情晶體，但它們的共同功能是為尾聯的惘然累積重量——意象越多越華美，最終的惘然越沉。
