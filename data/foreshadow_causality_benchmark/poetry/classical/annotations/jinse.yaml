  structure_type: [symbolic, psychological]
annotation_guide:
  focus:
    - 標注中間兩聯四個典故意象的堆疊：莊生夢蝶、望帝杜鵑、滄海珠淚、藍田玉煙。
    - 標注每個典故將歷史/神話人物轉化為當下情感的象徵物的方式。
    - 標注首聯錦瑟起興與尾聯此情惘然的收束關係——中間四組意象是情感的唯一載體。
    - 標注意象堆疊的遞進：夢→春心→淚→煙，從迷到悲到朦朧。
  boundary_notes:
    - 錦瑟無端五十弦是起興，不是純粹意象堆疊，但它設定了全詩的情感基座。
    - 四個典故意象各自獨立但共同指向「華年已逝」的情感核心。
events:
