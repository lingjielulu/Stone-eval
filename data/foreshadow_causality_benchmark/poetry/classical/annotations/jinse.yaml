  - event_id: JS_E03
    story_id: jinse
    chapter_or_section: "頷聯"
    text_span: P0002
    summary: 望帝春心託杜鵑——用望帝化鵑的典故，意象堆疊（春心＋杜鵑），暗示至死不渝的執念與哀鳴。
    participants: [望帝, 杜鵑, 春心]
    location: 蜀地
    time: 暮春
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: JS_E04
    story_id: jinse
    chapter_or_section: "頸聯"
    text_span: P0003
    summary: 滄海月明珠有淚——用鮫人泣珠的典故，意象堆疊（滄海＋明月＋珠＋淚），冷寂月光下的悲哀。
    participants: [滄海, 明月, 珠, 淚]
    location: 滄海之上
    time: 月夜
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: JS_E05
    story_id: jinse
    chapter_or_section: "頸聯"
    text_span: P0003
    summary: 藍田日暖玉生煙——用藍田產玉的典故，意象堆疊（藍田＋暖日＋玉＋煙），美好但不可觸及的朦朧。
    participants: [藍田, 暖日, 玉, 煙]
    location: 藍田
    time: 暖日
    event_type: symbolic
    certainty: {value: certain}
