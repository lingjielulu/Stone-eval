    source_event_id: TF_E05
    target_event_id: TF_E06
    relation_type: causes
    strength: {value: strong}
    evidence_text_span: P0023-P0030
    explanation: Snow from the spruce destroys the successful fire, forcing a second attempt after the man's hands and feet have worsened.
  - edge_id: TF_C04
    story_id: to_build_a_fire
    source_event_id: TF_E06
    target_event_id: TF_E07
    relation_type: motivates
    strength: {value: strong}
    evidence_text_span: P0030-P0031
    explanation: The failed second fire drives the desperate idea of using the dog's body heat.
  - edge_id: TF_C05
    story_id: to_build_a_fire
    source_event_id: TF_E06
    target_event_id: TF_E08
    relation_type: causes
    strength: {value: strong}
    evidence_text_span: P0030-P0040
    explanation: Failure to restore fire removes the last available survival mechanism.
  - edge_id: TF_C06
    story_id: to_build_a_fire
    source_event_id: TF_E07
    target_event_id: TF_E08
    relation_type: prevents
    strength: {value: medium}
    evidence_text_span: P0031-P0033
    explanation: Frozen hands prevent him from killing the dog or using it as a heat source.
foreshadowing_units:
  - foreshadowing_id: TF_F01
    story_id: to_build_a_fire
    foreshadowing_text_span: P0003-P0007
    foreshadowing_summary: The cold is framed as a rule the man does not imaginatively understand but the dog senses.
    foreshadowing_type: rule
    trigger_event_id: TF_E04
    payoff_event_id: TF_E08
    payoff_text_span: P0034-P0040
    payoff_summary: The environment's rule is fulfilled when exposure and failed fire-building kill the man.
    payoff_type: literal
    confidence: {value: high}
    explanation: The story tests whether a system can treat physical conditions as active causal constraints.
  - foreshadowing_id: TF_F02
    story_id: to_build_a_fire
    foreshadowing_text_span: P0011-P0013
    foreshadowing_summary: Hidden spring traps and wet feet are explicitly marked as dangerous.
    foreshadowing_type: rule
    trigger_event_id: TF_E04
    payoff_event_id: TF_E05
    payoff_text_span: P0017-P0023
    payoff_summary: The man wets his feet and must make a flawless fire to survive.
    payoff_type: literal
    confidence: {value: high}
    explanation: A local hazard becomes the initiating accident for the fatal chain.
  - foreshadowing_id: TF_F03
    story_id: to_build_a_fire
    foreshadowing_text_span: P0020-P0021
    foreshadowing_summary: The old-timer's rule says no one should travel alone after fifty below.
    foreshadowing_type: rule
    trigger_event_id: TF_E05
    payoff_event_id: TF_E08
    payoff_text_span: P0024-P0040
    payoff_summary: The man recognizes that a trail-mate could have built the second fire and saved him.
    payoff_type: negative
    confidence: {value: high}
    explanation: The payoff is the absence of help, showing a violated survival rule.
  - foreshadowing_id: TF_F04
    story_id: to_build_a_fire
    foreshadowing_text_span: P0018-P0019
    foreshadowing_summary: The man builds near spruce brush because it is easier to pull twigs directly.
    foreshadowing_type: spatial
    trigger_event_id: TF_E05
    payoff_event_id: TF_E05
    payoff_text_span: P0023
    payoff_summary: Pulling twigs shakes the loaded tree and drops snow onto the fire.
    payoff_type: literal
    confidence: {value: high}
    explanation: The spatial convenience is converted into a physical causal failure.
characters:
  - character_id: TF_CH01
    story_id: to_build_a_fire
    name: the man
    role: protagonist
    stable_traits: [practical, overconfident, unimaginative]
    current_motivation_by_event:
      - event_id: TF_E04
        motivation: Reach camp by schedule despite the accident.
        knowledge_state: Knows wet feet require fire but underestimates cascading risk.
        emotional_state: Angry, then focused.
        goal: Dry his feet and continue.
      - event_id: TF_E07
        motivation: Recover hand function and survive.
        knowledge_state: Knows fire-building has failed and the dog is warm.
        emotional_state: Desperate and fearful.
        goal: Use the dog's body heat.
  - character_id: TF_CH02
    story_id: to_build_a_fire
    name: the dog
    role: instinctive contrast agent
    stable_traits: [instinctive, cold-aware, self-preserving]
    current_motivation_by_event:
      - event_id: TF_E03
        motivation: Stay near fire and avoid lethal cold.
        knowledge_state: Instinctively understands that travel is unsafe.
        emotional_state: Apprehensive.
        goal: Remain warm.
