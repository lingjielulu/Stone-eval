foreshadowing_units:
  - foreshadowing_id: NE_F01
    story_id: necklace
    foreshadowing_text_span: P0043-P0048
    foreshadowing_summary: Mathilde chooses the superb-looking necklace because of appearance, without verifying value.
    foreshadowing_type: object
    trigger_event_id: NE_E04
    payoff_event_id: NE_E07
    payoff_text_span: P0112-P0122
    payoff_summary: The object is revealed to have been paste, making the sacrifice tragically disproportionate.
    payoff_type: delayed_revelation
    confidence: {value: high}
    explanation: The necklace's assumed value is the hinge of the story's delayed twist.
  - foreshadowing_id: NE_F02
    story_id: necklace
    foreshadowing_text_span: P0001-P0006
    foreshadowing_summary: Mathilde's class anxiety and hunger for admiration prepare her risky choices.
    foreshadowing_type: psychological
    trigger_event_id: NE_E02
    payoff_event_id: NE_E06
    payoff_text_span: P0091-P0100
    payoff_summary: Her pursuit of status leads to the loss of the beauty and comfort she prized.
    payoff_type: ironic
    confidence: {value: high}
    explanation: The setup is motivational foreshadowing rather than a physical clue.
  - foreshadowing_id: NE_F03
    story_id: necklace
    foreshadowing_text_span: P0079-P0089
    foreshadowing_summary: The decision to hide the loss prevents immediate verification with Forestier.
    foreshadowing_type: retrospective
    trigger_event_id: NE_E05
    payoff_event_id: NE_E07
    payoff_text_span: P0112-P0122
    payoff_summary: Had they confessed, the cheapness of the original might have been learned at once.
    payoff_type: ironic
    confidence: {value: medium}
    explanation: This is clearest after the ending reinterprets concealment as the fatal procedural mistake.
characters:
  - character_id: NE_CH01
    story_id: necklace
    name: Mathilde Loisel
    role: protagonist
    stable_traits: [status-conscious, imaginative, dissatisfied]
    current_motivation_by_event:
      - event_id: NE_E03
        motivation: Appear worthy of elite social admiration.
        knowledge_state: Believes the necklace is genuinely valuable.
        emotional_state: Ecstatic and anxious.
        goal: Attend the ball without visible class inferiority.
      - event_id: NE_E07
        motivation: Claim moral closure after years of repayment.
        knowledge_state: Learns the original necklace was paste.
        emotional_state: Proud, then devastated by revelation.
        goal: Explain the truth to Madame Forestier.
  - character_id: NE_CH02
    story_id: necklace
    name: Monsieur Loisel
    role: husband
    stable_traits: [accommodating, practical, self-sacrificing]
    current_motivation_by_event:
      - event_id: NE_E05
        motivation: Protect his household from shame and legal/social exposure.
        knowledge_state: Assumes the borrowed necklace must be replaced.
        emotional_state: Alarmed and resigned.
        goal: Find money and return an indistinguishable necklace.
