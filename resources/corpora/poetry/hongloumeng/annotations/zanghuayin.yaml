    story_id: zanghuayin
    chapter_or_section: "全詩"
    text_span: P0001-P0002
    summary: 開篇意象堆疊——花謝花飛花滿天，紅消香斷有誰憐？游絲軟繫、落絮輕沾，滿天飛花打開凋零圖景。
    participants: [落花, 游絲, 落絮]
    location: 大觀園
    time: 暮春
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: ZH_E02
    story_id: zanghuayin
    chapter_or_section: "全詩"
    text_span: P0003-P0004
    summary: 葬花人出場——閨中女兒惜春暮，手把花鋤出繡簾，忍踏落花來復去，花鋤作為核心物件首次出現。
    participants: [黛玉, 花鋤]
    location: 大觀園
    time: 暮春
    event_type: action
    certainty: {value: certain}
    narrative_reality_level: {value: real}
  - event_id: ZH_E03
    story_id: zanghuayin
    chapter_or_section: "全詩"
    text_span: P0005-P0008
    summary: 燕子意象——柳絲榆莢自芳菲，三月香巢已壘成，燕子無情，人去巢傾，以燕子比附人情冷暖與聚散無常。
    participants: [柳絲, 榆莢, 燕子]
    location: 大觀園
    time: 暮春
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: ZH_E04
    story_id: zanghuayin
    chapter_or_section: "全詩"
    text_span: P0009-P0010
    summary: 風刀霜劍意象——一年三百六十日風刀霜劍嚴相逼，明媚鮮妍能幾時，以自然暴力映射命運壓迫。
    participants: [風刀, 霜劍]
    location: 大觀園
    time: 循環時間
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: ZH_E05
    story_id: zanghuayin
    chapter_or_section: "全詩"
    text_span: P0011-P0014
    summary: 葬花儀式——獨倚花鋤淚暗灑，灑上空枝見血痕，杜鵑無語正黃昏，荷鋤歸去，青燈冷雨，葬花的悲傷儀式。
    participants: [黛玉, 花鋤, 杜鵑]
    location: 大觀園花塚
    time: 黃昏至夜
    event_type: action
    certainty: {value: certain}
    narrative_reality_level: {value: real}
  - event_id: ZH_E06
    story_id: zanghuayin
    chapter_or_section: "全詩"
    text_span: P0015-P0018
    summary: 花魂鳥魂意象——昨宵庭外悲歌發，花魂鳥魂總難留，將花鳥賦予靈魂，深化物我同悲的境界。
    participants: [花魂, 鳥魂]
    location: 大觀園
    time: 夜色
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: ZH_E07
    story_id: zanghuayin
    chapter_or_section: "全詩"
    text_span: P0019-P0022
    summary: 錦囊淨土意象——願奴脅下生雙翼，未若錦囊收艷骨，一抔淨土掩風流，質本潔來還潔去，葬花工具鏈（錦囊→淨土）與潔身自好的價值宣言。
    participants: [黛玉, 錦囊, 淨土]
    location: 想像的天盡頭
    time: 未來
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: ZH_E08
    story_id: zanghuayin
    chapter_or_section: "全詩"
    text_span: P0023-P0024
    summary: 葬花到自葬的伏筆轉折——爾今死去儂收葬，未卜儂身何日喪？儂今葬花人笑癡，他年葬儂知是誰？從葬花儀式過渡到自身命運的預感。
    participants: [黛玉]
    location: 花塚
    time: 未來預感
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: ZH_E09
    story_id: zanghuayin
    chapter_or_section: "全詩"
    text_span: P0025-P0026
    summary: 終極回收——試看春殘花漸落，便是紅顏老死時，一朝春盡紅顏老，花落人亡兩不知！花與人的命運最終合為一體。
    participants: [花, 黛玉]
    location: 命運終點
    time: 終局
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
