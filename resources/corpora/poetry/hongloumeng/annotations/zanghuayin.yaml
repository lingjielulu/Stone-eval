metadata:
  story_id: zanghuayin
  title: "葬花吟"
  author: "曹雪芹"
  language: zh
  source_text_path: resources/corpora/poetry/hongloumeng/normalized_texts/zanghuayin.txt
  source_url: https://zh.wikisource.org/wiki/紅樓夢/第027回
  copyright_status: public_domain
  genre: classical_chinese_poetry_imagery_stack
  length_level: short
  structure_type: [symbolic, psychological]
annotation_guide:
  focus:
    - 標注開放意象堆疊——「花謝花飛花滿天，紅消香斷有誰憐」以重複的花意象打開全篇。
    - 虛擬物件堆疊：花鋤、錦囊、淨土——葬花工具鏈構成儀式性符號系統。
    - 「儂今葬花人笑癡，他年葬儂知是誰」是從葬花到自葬的伏筆轉折。
    - 「一朝春盡紅顏老，花落人亡兩不知」是全部意象堆疊的終極回收。
  boundary_notes:
    - 葬花吟是《紅樓夢》中最長的詩歌之一，共52句，是黛玉命運的核心伏筆。
    - 花與人的命運互喻貫穿全詩，適合測試物件—人物—命運的多層次因果標注。
