foreshadowing_units:
  - foreshadowing_id: ZH_F01
    story_id: zanghuayin
    foreshadowing_text_span: P0001-P0002
    foreshadowing_summary: 花謝花飛花滿天，紅消香斷有誰憐——以花開篇，重複三次「花」字將凋零意象推向極致，奠定全詩以花喻人的基調。
    foreshadowing_type: symbolic
    trigger_event_id: ZH_E08
    payoff_event_id: ZH_E09
    payoff_text_span: P0025-P0026
    payoff_summary: 一朝春盡紅顏老，花落人亡兩不知——花與人的命運最終統一於「兩不知」的絕望。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 開篇的花意象堆疊暗示花即人的命運映射，結尾花落人亡完成這個映射的終極回收。
  - foreshadowing_id: ZH_F02
    story_id: zanghuayin
    foreshadowing_text_span: P0003-P0004
    foreshadowing_summary: 花鋤作為核心物件出現——手把花鋤出繡簾，忍踏落花來復去。
    foreshadowing_type: object
    trigger_event_id: ZH_E05
    payoff_event_id: ZH_E08
    payoff_text_span: P0023-P0024
    payoff_summary: 儂今葬花人笑癡——花鋤從葬花的工具變為自我命運的鏡子，葬花即葬己。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 花鋤從實用工具升華為命運隱喻，葬花的動作預演了黛玉自身的命運。
  - foreshadowing_id: ZH_F03
    story_id: zanghuayin
    foreshadowing_text_span: P0021-P0022
    foreshadowing_summary: 錦囊收艷骨、淨土掩風流、質本潔來還潔去——葬花的儀式工具鏈（錦囊→淨土）與潔身自好的價值宣言。
    foreshadowing_type: symbolic
    trigger_event_id: ZH_E08
    payoff_event_id: ZH_E09
    payoff_text_span: P0025-P0026
    payoff_summary: 花落人亡兩不知——潔身自好的理想在必然的死亡面前化為虛無。
    payoff_type: ironic
    confidence: {value: medium}
    explanation: 錦囊淨土的儀式越是完整，越是反襯死亡不可抗拒的本質——潔來潔去的理想被花落人亡的現實覆寫。
characters:
  - character_id: ZH_CH01
