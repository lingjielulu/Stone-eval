      - event_id: ZH_E02
        motivation: 惜春暮，不忍見落花被踐踏。
        knowledge_state: 知道自己的身世飄零，以花自比。
        emotional_state: 愁緒滿懷（愁緒滿懷無釋處）。
        goal: 為落花尋找一個歸宿（葬花）。
      - event_id: ZH_E08
        motivation: 由葬花聯想到自身命運，預感死亡。
        knowledge_state: 意識到自己與花同命，終將凋零。
        emotional_state: 悲傷至極（淚暗灑、見血痕）。
        goal: 以葬花儀式寄託對自身命運的深切憂慮。
