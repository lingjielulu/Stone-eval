    text_span: P0004
    summary: 莫等閒白了少年頭，空悲切——時間緊迫感從意象堆疊中湧出，化為激越的自警。
    participants: [岳飛]
    location: 同上
    time: 當下
    event_type: decision
    certainty: {value: certain}
