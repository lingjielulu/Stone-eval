foreshadowing_units:
  - foreshadowing_id: MJ_F01
    story_id: manjianghong
    foreshadowing_text_span: P0001-P0003
    foreshadowing_summary: 怒髮衝冠的激憤與三十功名塵與土、八千里路雲和月的意象化總結，為後文復仇誓言建立情感與歷史重量。
    foreshadowing_type: psychological
    trigger_event_id: MJ_E04
    payoff_event_id: MJ_E06
    payoff_text_span: P0005-P0008
    payoff_summary: 靖康恥和收拾舊山河的誓言回收前文的激憤與虛無感，把塵土雲月歸結為必須以戰爭洗雪的國族創傷。
    payoff_type: literal
    confidence: {value: high}
    explanation: 前文的意象堆疊不是消極的虛無（如天淨沙），而是積極動員的情感儲備。塵土雲月越輕，復仇誓言越重。
