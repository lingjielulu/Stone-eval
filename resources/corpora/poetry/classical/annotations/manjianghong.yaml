    text_span: P0005
    summary: 靖康恥猶未雪、臣子恨何時滅——國仇家恨從塵土雲月的詩意轉為具體歷史創傷。
    participants: [岳飛, 宋人]
    location: 宋朝疆土
    time: 靖康之變後
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: real}
  - event_id: MJ_E05
    story_id: manjianghong
    chapter_or_section: "下闋"
    text_span: P0006-P0007
    summary: 駕長車踏破賀蘭山缺，飢餐胡虜肉、渴飲匈奴血——戰爭意象從地理延伸到身體，名詞堆疊（胡虜肉、匈奴血）將復仇慾望具象化。
    participants: [岳飛, 胡虜, 匈奴]
    location: 賀蘭山
    time: 未來征戰
    event_type: decision
    certainty: {value: certain}
    narrative_reality_level: {value: narrated}
  - event_id: MJ_E06
    story_id: manjianghong
    chapter_or_section: "下闋"
    text_span: P0008
    summary: 待從頭收拾舊山河，朝天闕——情感從塵土雲月、胡虜肉匈奴血全部收束為重整山河的終極誓言。
    participants: [岳飛]
    location: 朝廷
    time: 未來
    event_type: decision
    certainty: {value: certain}
    narrative_reality_level: {value: real}
