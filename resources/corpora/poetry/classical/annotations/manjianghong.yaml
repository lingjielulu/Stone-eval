  structure_type: [symbolic, psychological]
annotation_guide:
  focus:
    - 標注三十功名塵與土、八千里路雲和月為對偶意象堆疊的核心單元。
    - 標注塵與土、雲和月這兩組自然意象如何將功名和征途轉化為可視的物理畫面。
    - 標注靖康恥、胡虜肉、匈奴血等歷史意象與前文自然意象的轉換，形成情感遞進。
    - 標注從憑欄怒髮到朝天闕的情感軌跡，前文意象堆疊為後文誓言的伏筆。
  boundary_notes:
    - 塵與土、雲和月是名詞並置，但不同於天淨沙的純靜物堆疊，此處有名詞轉喻（功名→塵土，征途→雲月）的修辭層次。
