metadata:
  story_id: shangshan_zaoxing
  title: "商山早行"
  author: "溫庭筠"
  language: zh
  source_text_path: resources/corpora/poetry/classical/normalized_texts/shangshan_zaoxing.txt
  source_url: https://zh.wikisource.org/wiki/%E5%95%86%E5%B1%B1%E6%97%A9%E8%A1%8C
  copyright_status: public_domain
  genre: classical_chinese_poetry_imagery_stacking
  length_level: short
  structure_type: [symbolic, psychological]
annotation_guide:
  focus:
    - 標注名詞意象堆疊的經典手法：雞聲茅店月、人跡板橋霜，六個名詞全無動詞連接。
    - 標注首聯（客行悲故鄉）為情感起點，中間兩聯意象堆疊為證據，尾聯夢境為回應。
    - 標注意象堆疊從「出發」（晨起、茅店）到「途中」（山路、驛牆）再到「回憶」（杜陵夢）的空間與心理遞進。
  boundary_notes:
    - 雞聲茅店月與人跡板橋霜是詩中最核心的意象堆疊單元，每一組三個名詞各自獨立又互相渲染。
events:
  - event_id: SZ_E01
    story_id: shangshan_zaoxing
    chapter_or_section: "首聯"
    text_span: P0001
    summary: 晨起出發，車鈴聲動；客行異鄉，心悲故鄉。
    participants: [旅人]
    location: 驛站
    time: 清晨
    event_type: internal_state
    certainty: {value: certain}
    narrative_reality_level: {value: real}
  - event_id: SZ_E02
    story_id: shangshan_zaoxing
    chapter_or_section: "頷聯"
    text_span: P0002
    summary: 雞聲茅店月——聽覺（雞鳴）與視覺（茅店、殘月）三重意象疊加，刻畫黎明前出發的孤寂場景。
    participants: [雞聲, 茅店, 月]
    location: 茅店外
    time: 黎明前
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: SZ_E03
    story_id: shangshan_zaoxing
    chapter_or_section: "頷聯"
    text_span: P0002
    summary: 人跡板橋霜——足跡、板橋、晨霜三層意象，呈現早行者的孤獨與寒冷。
    participants: [人跡, 板橋, 霜]
    location: 板橋上
    time: 清晨
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: SZ_E04
    story_id: shangshan_zaoxing
    chapter_or_section: "頸聯"
    text_span: P0003
    summary: 槲葉落山路、枳花明驛牆——沿途景物從蕭瑟轉為明亮，暗示時光推移。
    participants: [槲葉, 山路, 枳花, 驛牆]
    location: 山路上
    time: 天亮後
    event_type: symbolic
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
  - event_id: SZ_E05
    story_id: shangshan_zaoxing
    chapter_or_section: "尾聯"
    text_span: P0004
    summary: 因思杜陵夢，鳧雁滿回塘——回憶長安故鄉的夢境，水鳥滿塘的溫暖畫面。
    participants: [旅人, 鳧雁]
    location: 杜陵（夢中的長安故鄉）
    time: 夢境
    event_type: revelation
    certainty: {value: certain}
    narrative_reality_level: {value: symbolic}
causal_edges:
  - edge_id: SZ_C01
    story_id: shangshan_zaoxing
    source_event_id: SZ_E01
    target_event_id: SZ_E02
    relation_type: motivates
    strength: {value: strong}
    evidence_text_span: P0001-P0002
    explanation: 客行之悲使旅人對周遭景物格外敏感，雞聲茅店月是悲情投射的產物。
  - edge_id: SZ_C02
    story_id: shangshan_zaoxing
    source_event_id: SZ_E02
    target_event_id: SZ_E03
    relation_type: symbolically_echoes
    strength: {value: strong}
    evidence_text_span: P0002
    explanation: 雞聲茅店月與人跡板橋霜並列堆疊，六個名詞互相渲染，共同構成早行孤寒圖。
  - edge_id: SZ_C03
    story_id: shangshan_zaoxing
    source_event_id: SZ_E03
    target_event_id: SZ_E04
    relation_type: symbolically_echoes
    strength: {value: medium}
    evidence_text_span: P0002-P0003
    explanation: 從板橋微觀到山路宏觀，景物從霜寒轉為花明，暗示時間推進與心理變化。
  - edge_id: SZ_C04
    story_id: shangshan_zaoxing
    source_event_id: SZ_E04
    target_event_id: SZ_E05
    relation_type: reveals
    strength: {value: strong}
    evidence_text_span: P0003-P0004
    explanation: 沿途景物觸發對故鄉夢境的回憶，枳花的明亮引出杜陵鳧雁的溫暖。
  - edge_id: SZ_C05
    story_id: shangshan_zaoxing
    source_event_id: SZ_E05
    target_event_id: SZ_E01
    relation_type: symbolically_echoes
    strength: {value: medium}
    evidence_text_span: P0001-P0004
    explanation: 尾聯夢中的故鄉溫暖照應首聯客行的故鄉之悲，形成閉環。
foreshadowing_units:
  - foreshadowing_id: SZ_F01
    story_id: shangshan_zaoxing
    foreshadowing_text_span: P0002
    foreshadowing_summary: 雞聲茅店月、人跡板橋霜——六個名詞純意象堆疊，不作任何情感判斷，但字字滲透早行的寒苦與孤寂。
    foreshadowing_type: symbolic
    trigger_event_id: SZ_E04
    payoff_event_id: SZ_E05
    payoff_text_span: P0004
    payoff_summary: 因思杜陵夢，鳧雁滿回塘——意象堆疊的全部寒意在此被故鄉夢境的溫暖反襯、回收。
    payoff_type: symbolic
    confidence: {value: high}
    explanation: 中間兩聯意象越寒冷、越客觀，尾聯故鄉夢境越溫暖、越令人心碎。名詞堆疊的克制是情感的最大伏筆。
characters:
  - character_id: SZ_CH01
    story_id: shangshan_zaoxing
    name: 旅人（客）
    role: 抒情主體／早行旅客
    stable_traits: [思鄉, 孤獨, 行旅勞頓]
    current_motivation_by_event:
      - event_id: SZ_E01
        motivation: 為生計或官職奔波，不得不早行出發。
        knowledge_state: 身在商山，思念杜陵故鄉。
        emotional_state: 悲傷、孤寂。
        goal: 趕路前行，但心在故鄉。
