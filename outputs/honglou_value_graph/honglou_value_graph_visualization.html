mary": "贾宝玉从痴于情(情不情)走向觉悟于空(悟空)，这是全书最核心的个人价值转化弧线。"}], "foreshadow_lines": [{"id": "honglou:original_80:ftp:000001", "foreshadow": {"global_sentence_index": 1, "chapter_index": 1, "text": "醒来后遇癞头跛足道人，被告知女儿英莲有命无运，并留下四句预言诗。", "description": "癞头跛足道人预言甄英莲有命无运，留下四句诗。", "type": "poem"}, "trigger": {"description": "门子在审理薛蟠案时向贾雨村详述被卖婢女正是甄士隐丢失之女英莲，并说明薛蟠恃强夺人经过。", "observable_conditions": ["门子说出被卖婢女眉心的胭脂记，指出她就是英莲", "门子讲述英莲被拐后卖入薛家，冯渊争买被薛蟠打死"]}, "payoff": {"global_sentence_index": 21, "chapter_index": 4, "text": "门子出示护官符，点明四大家族权势，并详述案底：被卖婢女正是甄士隐丢失之女英莲，冯渊立意娶她为妻，薛蟠恃强夺人，将冯渊活活打死。", "description": "门子详述薛蟠案底：被卖婢女正是英莲，冯渊欲娶，薛蟠打死冯渊，强抢英莲。"}, "distance_chapters": 3, "confidence": 0.95}, {"id": "honglou:original_80:ftp:000002", "foreshadow": {"global_sentence_index": 2, "chapter_index": 1, "text": "穷儒贾雨村暂居葫芦庙，偶遇甄家丫鬟娇杏回顾，以为知己。", "description": "穷儒贾雨村暂居葫芦庙，偶遇甄家丫鬟娇杏回顾，以为知己。", "type": "event"}, "trigger": {"description": "贾雨村得官上任后，甄家丫鬟娇杏在人群中认出他来，雨村随即使人传唤封肃，并最终迎娶娇杏。", "observable_conditions": ["甄家丫鬟认出新任太爷是贾雨村", "贾雨村差人来传封肃问话", "贾雨村娶娇杏为二房并后扶正"]}, "payoff": {"global_sentence_index": 7, "chapter_index": 2, "text": "贾雨村得知甄士隐出家后，娶了昔日回顾他的丫鬟娇杏为二房，后扶为正室。", "description": "贾雨村得知甄士隐出家后，娶了昔日回顾他的丫鬟娇杏为二房，后扶为正室。"}, "distance_chapters": 1, "confidence": 0.8}, {"id": "honglou:original_80:ftp:000003", "foreshadow": {"global_sentence_index": 42, "chapter_index": 7, "text": "次日凤姐携宝玉往宁府，会见尤氏与秦可卿，宝玉得见秦钟，二人彼此倾慕，约定入贾府家塾读书。", "description": "宝玉与秦钟约定入贾府家塾读书，为后续学堂风波埋下伏笔。", "type": "event"}, "trigger": {"description": "秦钟在学堂中与香怜亲近，被金荣撞见并辱骂，引发茗烟报复，导致群童械斗。", "observable_conditions": ["秦钟与香怜私下交谈", "金荣当众辱骂秦钟和香怜", "茗烟听到辱骂后动手报复"]}, "payoff": {"global_sentence_index": 55, "chapter_index": 9, "text": "贾瑞偏袒金荣，贾蔷为避嫌挑唆茗烟报复，茗烟率小厮大闹学堂，导致众顽童械斗。", "description": "学堂内因秦钟与香怜亲近被辱骂，引发茗烟率小厮械斗。"}, "distance_chapters": 2, "confidence": 0.9}, {"id": "honglou:original_80:ftp:000004", "foreshadow": {"global_sentence_index": 56, "chapter_index": 9, "text": "李贵喝止平息，宝玉执意撵走金荣，茗烟揭出金荣系璜大奶奶之侄。", "description": "茗烟在学堂纠纷中揭露出金荣是东府璜大奶奶的侄儿，暗示金家与宁国府有亲戚关系。", "type": "speech_act"}, "trigger": {"description": "金荣回家后向母亲和姑母哭诉学堂遭遇，金氏愤怒并决定前往宁府找秦可卿为侄儿出头。", "observable_conditions": ["金荣回家诉说被逼赔礼受辱", "金氏得知侄儿受欺", "金氏前往宁府欲找秦可卿理论"]}, "payoff": {"global_sentence_index": 59, "chapter_index": 10, "text": "金荣的姑妈金氏得知后怒不可遏，前往宁府欲找秦可卿理论，却从尤氏口中得知秦氏重病，因兄弟秦钟受欺而忧愤加重。", "description": "金荣的姑妈金氏（璜大奶奶）得知侄儿受欺后，前往宁府找秦可卿理论，但因秦可卿病重而作罢，使得这层关系未能真正发挥作用。"}, "distance_chapters": 1, "confidence": 0.8}, {"id": "honglou:original_80:ftp:000005", "foreshadow": {"global_sentence_index": 62, "chapter_index": 10, "text": "张友士诊脉后断言非喜，乃水亏火旺、忧虑伤脾之症，开出益气养荣补脾和肝汤，并言若能过春分方可望痊愈。", "description": "张友士诊脉后断言秦可卿病症非喜，乃忧虑伤脾，开出药方并言若能过春分方可望痊愈。", "type": "speech_act"}, "trigger": {"description": "秦可卿临终托梦给凤姐，使其惊醒后得知死讯，从而确认张友士的春分预言未实现。", "observable_conditions": ["凤姐梦见秦可卿临终托言（076）", "凤姐惊醒后得知秦氏已逝（077）"]}, "payoff": {"global_sentence_index": 77, "chapter_index": 13, "text": "凤姐惊醒后得知秦氏己逝，合家悲痛，宝玉急火攻心吐血。", "description": "凤姐从梦中惊醒得知秦氏已逝，合家悲痛。"}, "distance_chapters": 3, "confidence": 0.9}, {"id": "honglou:original_80:ftp:000007", "foreshadow": {"global_sentence_index": 75, "chapter_index": 12, "text": "年末林如海病重，贾母命贾琏送黛玉回扬州。", "description": "年末林如海病重，贾母命贾琏送黛玉回扬州。", "type": "event"}, "trigger": {"description": "林如海病故，苏州昭儿前来报丧。", "observable_conditions": ["苏州昭儿来报林如海病故"]}, "payoff": {"global_sentence_index": 83, "chapter_index": 14, "text": "苏州昭儿来报林如海病故，黛玉将长住贾府，宝玉为之蹙眉长叹。", "description": "苏州昭儿来报林如海病故，黛玉将长住贾府，宝玉为之蹙眉长叹。"}, "distance_chapters": 2, "confidence": 0.8}, {"id": "honglou:original_80:ftp:000008", "foreshadow": {"global_sentence_index": 113, "chapter_index": 19, "text": "李嬷嬷来宝玉房中，不顾阻拦吃掉留给袭人的酥酪，并抱怨宝玉宠袭人忘奶母。", "description": "李嬷嬷来宝玉房中，不顾阻拦吃掉留给袭人的酥酪，并抱怨宝玉宠袭人忘奶母，扬言还会再来找麻烦。", "type": "speech_act"}, "trigger": {"description": "李嬷嬷因赌输迁怒，再次来到宝玉房中闹事", "observable_conditions": ["李嬷嬷在宝玉房中大声辱骂袭人", "提及以前吃茶撵茜雪等旧事", "李嬷嬷声称输了几两银子"]}, "payoff": {"global_sentence_index": 117, "chapter_index": 20, "text": "宝玉房中李嬷嬷因赌输迁怒，大骂袭人，宝玉回护，凤姐赶来解围，拉走李嬷嬷。", "description": "宝玉房中李嬷嬷因赌输迁怒，大骂袭人，宝玉回护，凤姐赶来解围，拉走李嬷嬷。"}, "distance_chapters": 1, "confidence": 0.8}, {"id": "honglou:original_80:ftp:000009", "foreshadow": {"global_sentence_index": 114, "chapter_index": 19, "text": "晚间袭人假借赎身之论试探宝玉，乘机箴规三事：不许说化灰化烟等无情语、在老爷前假装喜读书、改掉毁僧谤道和吃胭脂的毛病，宝玉悉数应允。", "description": "袭人假借赎身之论箴规宝玉三事，特别是不许吃胭脂的毛病，宝玉悉数应允。", "type": "speech_act"}, "trigger": {"description": "宝玉在湘云处梳洗时手持胭脂，被湘云看见，湘云打落胭脂。", "observable_conditions": ["湘云打落宝玉手中的胭脂"]}, "payoff": {"global_sentence_index": 123, "chapter_index": 21, "text": "史湘云与黛玉同寝，次日宝玉一早来至房中，与湘云梳洗，因少了一颗珍珠，黛玉出言讥讽，湘云打落宝玉手中胭脂。", "description": "史湘云与黛玉同寝，次日宝玉一早来至房中，与湘云梳洗，因少了一颗珍珠，黛玉出言讥讽，湘云打落宝玉手中胭脂。"}, "distance_chapters": 2, "confidence": 0.7}, {"id": "honglou:original_80:ftp:000010", "foreshadow": {"global_sentence_index": 152, "chapter_index": 25, "text": "马道婆进府，先哄贾母为宝玉点大海灯供奉菩萨，后受赵姨娘贿请，铰纸人青面鬼作法魇害凤姐与宝玉。", "description": "马道婆受赵姨娘贿请，铰纸人青面鬼作法魇害凤姐与宝玉。", "type": "symbol"}, "trigger": {"description": "凤姐与宝玉中邪发狂、刀砍鸡犬且百般医治无效，贾府陷入绝境，为癞僧跛道介入驱邪提供了契机。", "observable_conditions": ["凤姐与宝玉突然中邪发狂，刀砍鸡犬", "百般医治无效，贾府已备棺木"]}, "payoff": {"global_sentence_index": 155, "chapter_index": 25, "text": "危急时，一癞僧一跛道前来，取通灵玉持诵，念‘沉酣一梦终须醒’等语，称玉为声色所迷，悬之即可回春。", "description": "癞僧跛道前来，取通灵玉持诵，念‘沉酣一梦终须醒’等语，称玉为声色所迷，悬之即可回春，二人渐愈。"}, "distance_chapters": 0, "confidence": 0.75}, {"id": "honglou:original_80:ftp:000011", "foreshadow": {"global_sentence_index": 160, "chapter_index": 26, "text": "贾芸入怡红院见宝玉，客套后离去，向坠儿打听小红，并用自己的手帕托坠儿转交小红，暗传情意。", "description": "贾芸托坠儿将自己的手帕转交小红，暗传情意。", "type": "object"}, "trigger": {"description": "坠儿将贾芸的手帕转交给小红，小红收到后与坠儿在滴翠亭私下交谈，被宝钗无意偷听。", "observable_conditions": ["坠儿将手帕交给小红", "小红与坠儿在滴翠亭私下谈论手帕及谢礼"]}, "payoff": {"global_sentence_index": 164, "chapter_index": 27, "text": "芒种节众人饯花神，宝钗寻黛玉至潇湘馆，见宝玉先进去便回避，扑蝶至滴翠亭，无意偷听小红与坠儿私谈手帕之事，情急下使金蝉脱壳计，谎称追赶黛玉，嫁祸于林。", "description": "宝钗在滴翠亭无意偷听小红与坠儿私谈手帕谢礼之事。"}, "distance_chapters": 1, "confidence": 0.8}, {"id": "honglou:original_80:ftp:000012", "foreshadow": {"global_sentence_index": 180, "chapter_index": 29, "text": "本回中张道士提亲对象未明、金麒麟出现与湘云关联、神前拈戏暗喻盛衰等细节，皆为后续埋下伏笔。", "description": "第29回中张道士提亲时金麒麟出现并与湘云关联，预示后文。", "type": "object"}, "trigger": {"description": "湘云在蔷薇架下拾得金麒麟。", "observable_conditions": ["湘云在蔷薇架下看到金麒麟", "湘云擎在掌上，心中似有所感"]}, "payoff": {"global_sentence_index": 191, "chapter_index": 31, "text": "湘云携翠缕游园，二人论说阴阳，于蔷薇架下拾得宝玉所遗金麒麟，湘云心中忽有所感。", "description": "第31回湘云与翠缕论阴阳后，在蔷薇架下拾得宝玉所遗金麒麟，心中有所感，兑现金麒麟伏笔。"}, "distance_chapters": 2, "confidence": 0.85}, {"id": "honglou:original_80:ftp:000014", "foreshadow": {"global_sentence_index": 198, "chapter_index": 32, "text": "随后宝玉错将袭人当作黛玉吐露衷肠，袭人惊惧不安。", "description": "宝玉错将袭人当作黛玉吐露衷肠，袭人听后惊惧不安，担忧将来发生不才之事。", "type": "speech_act"}, "trigger": {"description": "王夫人传唤袭人，袭人趁机向王夫人提出让宝玉搬出园子的建议。", "observable_conditions": ["王夫人传唤袭人", "袭人向王夫人建议让宝玉搬出园子以避嫌疑"]}, "payoff": {"global_sentence_index": 209, "chapter_index": 34, "text": "王夫人传唤袭人，袭人建议让宝玉搬出园子以避嫌疑，王夫人深以为然，将宝玉托付给她。", "description": "王夫人传唤袭人，袭人建议让宝玉搬出园子以避嫌疑，王夫人深以为然并将宝玉托付给她。"}, "distance_chapters": 2, "confidence": 0.95}, {"id": "honglou:original_80:ftp:000015", "foreshadow": {"global_sentence_index": 211, "chapter_index": 34, "text": "薛家因宝玉挨打疑系薛蟠挑唆，薛蟠受冤大闹，情急下说出宝钗因金锁配玉才偏护宝玉，宝钗羞愤哭泣。", "description": "薛蟠大闹时情急说出宝钗因金锁配玉才偏护宝玉，宝钗羞愤哭泣，公开了金玉姻缘之说，造成宝钗的心结。", "type": "speech_act"}, "trigger": {"description": "宝玉入睡后说梦话，宝钗恰好在场绣兜肚时听到。", "observable_conditions": ["宝玉睡着并开始说梦话", "宝钗坐在旁边绣兜肚"]}, "payoff": {"global_sentence_index": 224, "chapter_index": 36, "text": "宝钗午时在怡红院替袭人绣鸳鸯兜肚，忽听宝玉梦中喊骂拒“金玉姻缘”，力挺“木石姻缘”，宝钗怔住。", "description": "宝钗在怡红院绣兜肚，亲耳听到宝玉梦中喊骂拒“金玉姻缘”并力挺“木石姻缘”，直接回应了之前公开的金玉话题，对宝钗造成打击。"}, "distance_chapters": 2, "confidence": 0.7}, {"id": "honglou:original_80:ftp:000016", "foreshadow": {"global_sentence_index": 220, "chapter_index": 35, "text": "莺儿讲述配色花样，宝钗来建议以金线络宝玉之玉，袭人又得王夫人送菜，宝钗话带玄机。", "description": "第35回中，宝钗对袭人收到王夫人送菜一事发表暧昧评论，暗示尚有更特别的安排。", "type": "speech_act"}, "trigger": {"description": "王夫人决定提升袭人待遇，吩咐凤姐将她的月例提至姨娘级别。", "observable_conditions": ["王夫人向凤姐交代调整袭人月例", "凤姐执行月例调整"]}, "payoff": {"global_sentence_index": 223, "chapter_index": 36, "text": "凤姐窥破仆人意图谋取金钏儿月例空缺，故   "scene_node": { shape: "rect", r: 0, w: 150, h: 48, cls: "scene" },
  "transition_node": { shape: "circle", r: 6, w: 0, h: 0, cls: "trans" },
  "ending_node": { shape: "circle", r: 28, w: 0, h: 0, cls: "ending" },
};

function nodeColor(d) {
  if (d.type === "ending_node") return groupColors["Endings"] || {fill:"#e8f5e9", stroke:"#2e7d32"};
  if (d.type === "transition_node") return {fill: "#bdbdbd", stroke: "#757575"};
  return groupColors[d.group] || {fill: "#eceff1", stroke: "#90a4ae"};
}

// Build graph
const graphNodes = [];
const graphEdges = [];
const nodeMap = {};

for (const n of data.nodes) {
  const t = nodeTypes[n.type] || nodeTypes["scene_node"];
  let label = "";
  if (n.type === "scene_node") {
    label = n.title || n.id;
  } else if (n.type === "ending_node") {
    label = (n.ending_title || n.id).substring(0, 12);
  } else {
    label = "";
  }
  const gn = {
    id: n.id, type: n.type, group: n.group, label: label,
    narrative: n.narrative || "",
    chapter_range: n.chapter_range || "",
    value_transformations: n.value_transformations || [],
    character_decisions: n.character_decisions || [],
    foreshadow_refs: n.foreshadow_refs || [],
    payoff_refs: n.payoff_refs || [],
    shape: t.shape, r: t.r, w: t.w, h: t.h, cls: t.cls,
  };
  graphNodes.push(gn);
  nodeMap[n.id] = gn;
  if (n.type === "transition_node" && n.makes_available) {
    for (const target of n.makes_available) {
      graphEdges.push({ source: n.id, target: target, type: "linear" });
    }
  }
}

// Foreshadow/payoff edges
for (const n of graphNodes) {
  if (n.type !== "scene_node") continue;
  for (const ref of n.foreshadow_refs) {
    for (const m of graphNodes) {
      if (m.type === "scene_node" && m.payoff_refs && m.payoff_refs.includes(ref)) {
        graphEdges.push({ source: n.id, target: m.id, type: "foreshadow", ref: ref });
      }
    }
  }
}

// D3 setup
const svg = document.getElementById("main-svg");
const width = () => document.getElementById("graph-panel").clientWidth;
const height = () => document.getElementById("graph-panel").clientHeight;
svg.setAttribute("viewBox", `0 0 1200 900`);

const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
svg.appendChild(g);

// Defs
const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
defs.innerHTML = `<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#90a4ae"/></marker>`;
svg.appendChild(defs);

// Edge group
const edgeG = document.createElementNS("http://www.w3.org/2000/svg", "g");
g.appendChild(edgeG);

// Node group
const nodeG = document.createElementNS("http://www.w3.org/2000/svg", "g");
g.appendChild(nodeG);

// Simulation
function edgeEndpointId(endpoint) {
  return endpoint && typeof endpoint === "object" ? endpoint.id : endpoint;
}

const validGraphEdges = graphEdges.filter(e => nodeMap[edgeEndpointId(e.source)] && nodeMap[edgeEndpointId(e.target)]);

const simulation = d3.forceSimulation(graphNodes)
  .force("link", d3.forceLink(validGraphEdges).id(d => d.id).distance(180))
  .force("charge", d3.forceManyBody().strength(-500))
  .force("center", d3.forceCenter(500, 400))
  .force("collide", d3.forceCollide(60))
  .force("y", d3.forceY(450).strength(0.03));

const link = d3.select(edgeG).selectAll("path")
  .data(validGraphEdges)
  .join("path")
  .attr("class", d => d.type === "foreshadow" ? "ft-edge" : "")
  .attr("fill", "none")
  .attr("stroke", d => d.type === "foreshadow" ? "#e91e63" : "#bdbdbd")
  .attr("stroke-width", d => d.type === "foreshadow" ? 2.5 : 1.8)
  .attr("opacity", d => d.type === "foreshadow" ? 0.7 : 0.5)
  .attr("marker-end", d => d.type === "linear" ? "url(#arrow)" : null);

const nodeSel = d3.select(nodeG).selectAll("g")
  .data(graphNodes)
  .join("g")
  .attr("cursor", d => d.type === "transition_node" ? "default" : "pointer")
  .call(d3.drag()
    .on("start", (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on("end", (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
  .on("click", (event, d) => showDetail(d))
  .on("mouseenter", (event, d) => { showTooltip(event, d); })
  .on("mouseleave", () => { document.getElementById("tooltip").style.display = "none"; });

nodeSel.filter(d => d.shape === "rect").append("rect")
  .attr("width", d => d.w).attr("height", d => d.h)
  .attr("x", d => -d.w/2).attr("y", d => -d.h/2)
  .attr("rx", 6).attr("ry", 6)
  .attr("fill", d => (nodeColor(d)).fill)
  .attr("stroke", d => (nodeColor(d)).stroke)
  .attr("stroke-width", 2.2);

nodeSel.filter(d => d.shape === "rect").append("text")
  .attr("text-anchor", "middle").attr("dy", "0.35em")
  .attr("fill", "#263238").attr("font-size", "11px").attr("font-weight", "600")
  .text(d => d.label.length > 14 ? d.label.substring(0, 13) + "…" : d.label);

nodeSel.filter(d => d.shape === "circle" && d.type === "transition_node").append("circle")
  .attr("r", d => d.r)
  .attr("fill", "#bdbdbd").attr("stroke", "#9e9e9e").attr("stroke-width", 1.5);

nodeSel.filter(d => d.shape === "circle" && d.type === "ending_node").append("circle")
  .attr("r", d => d.r)
  .attr("fill", d => (nodeColor(d)).fill)
  .attr("stroke", d => (nodeColor(d)).stroke)
  .attr("stroke-width", 3)
  .attr("stroke-dasharray", "6,3");

nodeSel.filter(d => d.type === "ending_node").append("text")
  .attr("text-anchor", "middle").attr("dy", "0.35em")
  .attr("fill", "#263238").attr("font-size", "10px").attr("font-weight", "600")
  .text(d => d.label);

simulation.on("tick", () => {
  link.attr("d", d => {
    const dx = d.target.x - d.source.x;
    const dy = d.target.y - d.source.y;
    const dr = Math.sqrt(dx * dx + dy * dy) * (d.type === "foreshadow" ? 2.5 : 1.2);
    return `M ${d.source.x} ${d.source.y} A ${dr} ${dr} 0 0 1 ${d.target.x} ${d.target.y}`;
  });
  nodeSel.attr("transform", d => `translate(${d.x}, ${d.y})`);
});

// Zoom
const zoom = d3.zoom().scaleExtent([0.2, 4]).on("zoom", (event) => {
  g.setAttribute("transform", event.transform);
});
d3.select(svg).call(zoom);

function zoomIn() { d3.select(svg).transition().call(zoom.scaleBy, 1.3); }
function zoomOut() { d3.select(svg).transition().call(zoom.scaleBy, 0.7); }
function zoomReset() { d3.select(svg).transition().call(zoom.transform, d3.zoomIdentity); }

// Detail panel
function showDetail(d) {
  if (d.type === "transition_node") return;
  const detail = document.getElementById("detail");
  let html = `<div class="title">${d.label || d.id}</div>`;
  const c = nodeColor(d);
  html += `<div class="group" style="background:${c.fill};border:1px solid ${c.stroke};">${d.group} | ${d.chapter_range}</div>`;
  if (d.narrative) html += `<p style="margin-top:6px;">${d.narrative.substring(0, 180)}${d.narrative.length > 180 ? '…' : ''}</p>`;
  if (d.value_transformations && d.value_transformations.length) {
    html += `<p style="margin-top:4px;font-weight:600;font-size:11px;">价值转化:</p>`;
    for (const vt of d.value_transformations) {
      html += `<div class="vt">${vt.axis}: ${vt.from_state} → ${vt.to_state} (${vt.direction})<br><small>${vt.turning_point_event || ''}</small></div>`;
    }
  }
  if (d.character_decisions && d.character_decisions.length) {
    html += `<p style="margin-top:4px;font-weight:600;font-size:11px;">角色抉择:</p>`;
    for (const cd of d.character_decisions) {
      html += `<p style="font-size:11px;margin:2px 0;">▸ ${cd.decision} <small style="color:#78909c;">[${cd.value_tags ? cd.value_tags.join(', ') : ''}]</small></p>`;
    }
  }
  if (d.foreshadow_refs && d.foreshadow_refs.length) {
    html += `<p class="ref" style="margin-top:4px;">🔮 伏笔: ${d.foreshadow_refs.join(', ')}</p>`;
  }
  if (d.payoff_refs && d.payoff_refs.length) {
    html += `<p class="ref">📌 回收: ${d.payoff_refs.join(', ')}</p>`;
  }
  detail.innerHTML = html;
}

function showTooltip(event, d) {
  if (d.type === "transition_node") return;
  const tip = document.getElementById("tooltip");
  tip.style.display = "block";
  tip.style.left = (event.pageX + 12) + "px";
  tip.style.top = (event.pageY - 10) + "px";
  tip.innerHTML = `<b>${d.label}</b> [${d.group}]<br>${d.chapter_range ? '第' + d.chapter_range + '回' : ''}${d.value_transformations && d.value_transformations.length ? '<br>' + d.value_transformations.map(v => v.axis).join(' | ') : ''}`;
}

// Search
document.getElementById("search-input").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  for (const n of graphNodes) {
    if (n.type === "transition_node") continue;
    const el = nodeSel.filter(d => d.id === n.id);
    if (q && !n.label.toLowerCase().includes(q) && !n.id.toLowerCase().includes(q) && !n.narrative.toLowerCase().includes(q)) {
      el.attr("opacity", 0.15);
    } else {
      el.attr("opacity", 1);
    }
  }
  link.attr("opacity", q ? 0.1 : d => d.type === "foreshadow" ? 0.7 : 0.5);
});

// Resize
window.addEventListener("resize", () => {
  simulation.alpha(0.1).restart();
});
</script>
</body>
</html>
